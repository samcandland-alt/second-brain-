<style>
  :root{ color-scheme: light;

  .askrow{display:flex;gap:8px;margin-top:8px;align-items:center}

<script>
const DATA = [{"slug": "lord-i-believe-jeffrey-holland", "folder": "sources", "type": "source", "category": "", "title": "\"Lord, I Believe", "author": "Jeffrey R. Holland", "channel": "The Church of Jesus Christ of Latter-day Saints", "date": "2013-04-09", "url": "https://www.youtube.com/watch?v=2nPY22FoDpY", "tags": ["faith", "doubt", "belief", "lds", "general-conference"], "updated": "2026-06-27", "body": "# \"Lord, I Believe\"\n\n## Summary\n\nElder Jeffrey R. Holland's April 2013 General Conference address, built around the scriptural account of a father who brings his afflicted son to Christ and says, \"Lord, I believe; help thou mine unbelief\" (Mark 9:24). Holland argues that the key is not the *quantity* of faith but the *integrity* demonstrated toward the faith you already have — and that you should lead with your belief, not your doubt.\n\n## Key takeaways\n\n- **Lead with your strength, not your weakness.** The father says \"Lord, I believe\" before acknowledging \"help thou mine unbelief.\" Asserting existing faith first is the correct order — not \"I have doubts, but I believe a little.\"\n- **Integrity toward the faith you have is the measure.** The size of faith is not the issue; the issue is whether you are true to the faith and truth you already possess.\n- **Don't lead with unbelief.** Doubts are real and have their place, but treating honest doubt as a higher form of moral courage than honest belief is a mistake. \"I am not asking you to pretend to faith you do not have. I am asking you to be true to the faith you do have.\"\n- **\"Hold the ground you have already won.\"** When doubt or difficulty come, don't abandon what you already know. Stand firm until additional knowledge comes.\n- **Belief is a precious first step.** A 14-year-old who says \"I can't say I *know* the church is true but I *believe* it is\" has done something precious. Belief is always the first step toward conviction.\n- **The plural \"us\" in the father's plea.** \"Have compassion on *us*\" — the father speaks for his whole family. He's not just asking for his son; the whole household is caught in the struggle.\n- **Imperfect vessels.** \"When the infinite fullness is poured forth, it's not the oil's fault if there's some loss because finite vessels can't quite contain it all.\" Be patient with the church as a human institution.\n\n## Entities mentioned\n\n[[jeffrey-r-holland]]\n\n## Concepts discussed\n\n[[faith-and-doubt]]\n\n## Contradictions / tensions with existing wiki\n\nNone — first faith/testimony source. Complements [[mental-performance]] (Craig Manning's task orientation): both frameworks suggest leading with what you *can* do rather than what you can't.\n\n## Quotes worth keeping\n\n> \"Be as cynical about your questions as you need to be — life is full of them on one subject or another. But if you and your family want to be healed, don't let those questions stand in the way of faith working its miracle.\"\n\n> \"The size of your faith or the degree of your knowledge is not the issue — it is the integrity you demonstrate toward the faith you do have and the truth you already know.\"\n\n> \"Hold fast to what you already know and stand strong until additional knowledge comes.\"\n\n> \"I told him that belief was always the first step toward conviction.\"", "links": ["faith-and-doubt", "jeffrey-r-holland", "mental-performance"]}, {"slug": "all-things-new", "folder": "entities", "type": "entity", "category": "product", "title": "All Things New: Rethinking Sin, Salvation, and Everything in Between", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "LDS", "theology", "salvation", "sin", "restoration"], "updated": "2026-06-27", "body": "# All Things New: Rethinking Sin, Salvation, and Everything in Between\n\nFiona Givens's theological reimagining of core Christian concepts — sin, salvation, and grace — through a Latter-day Saint lens.\n\n## Overview\nGivens challenges standard Protestant and Catholic frameworks for sin and salvation, proposing a more optimistic, grace-centered theology rooted in the LDS restoration and early Christian sources. Part of a broader project (with Terryl Givens) of recovering a generous, expansive LDS theology.\n\n## Key facts\n- Author: Fiona Givens\n- Genre: LDS Theology / Christian Thought\n- Length (audiobook): ~4 hours 12 minutes remaining\n\n## Connections\n- Related to: [[fiona-givens]]\n- See also: [[divine-family]], [[all-things-new-givens]] (stub)\n- Thematically adjacent to: [[dave-butler]], [[rob-kay]]\n\n## Notes / open questions\n- Fiona Givens often co-authors with Terryl Givens; check whether this is solo work\n- Represents the \"generous orthodoxy\" strand of LDS theological thought", "links": ["all-things-new-givens", "dave-butler", "divine-family", "fiona-givens", "rob-kay"]}, {"slug": "andrei-karpathy", "folder": "entities", "type": "entity", "category": "person", "title": "Andrei Karpathy", "author": "", "channel": "", "date": "", "url": "", "tags": ["ai", "llm", "researcher", "openai", "tesla"], "updated": "2026-06-26", "body": "# Andrei Karpathy\n\nAI researcher and educator; former Director of AI at Tesla, founding member of OpenAI, known for making deep AI concepts accessible through writing and teaching.\n\n## Overview\n\nKarpathy is best known in the AI community for his neural network courses (e.g. \"Zero to Hero\"), his clear explanatory writing, and his practical work on large language models. His April 2026 GitHub Gist \"LLM Wiki\" articulates a novel pattern for using LLMs not as retrieval systems but as active knowledge-base maintainers — a personal wiki that compounds over time.\n\n## Key facts\n\n- Former: Director of AI at Tesla, founding member/researcher at OpenAI\n- Known for: making AI research accessible; neural network education\n- Published: \"LLM Wiki\" gist (April 4, 2026) — foundational source for this wiki's architecture\n\n## Connections\n\n- Concepts: [[llm-wiki-pattern]]\n- Appears in: [[llm-wiki-karpathy]]\n\n## Notes / open questions\n\n- Worth tracking future writing/gists — his ideas on knowledge management may evolve", "links": ["llm-wiki-karpathy", "llm-wiki-pattern"]}, {"slug": "asherah", "folder": "concepts", "type": "concept", "category": "", "title": "Asherah", "author": "", "channel": "", "date": "", "url": "", "tags": ["asherah", "divine-feminine", "heavenly-mother", "el-shaddai", "tree-of-life", "wisdom", "temple", "josiah", "kabbalah"], "updated": "2026-06-27", "body": "# Asherah\n\nThe divine feminine figure in ancient Israelite religion — the Lady of the Temple, the tree of life, the personification of Wisdom, the divine Mother. Associated with *El Shaddai* (\"God with breasts\"), attested in first-temple inscriptions as Yahweh's consort, systematically suppressed by the Deuteronomic reform, and preserved in the Kabbalistic *Shekhinah* and (per LDS theology) as Heavenly Mother.\n\n## Explanation\n\nAsherah was not a Canaanite import into Israelite religion but a central figure of the *original* first-temple Israelite faith — the divine feminine counterpart to Yahweh. Her removal was a political-theological act, not a correction of Paganism.\n\n### Archaeological evidence\n\n- **Judean pillar figurines:** The most common archaeological find around Jerusalem from the first-temple period — thousands of 6-inch nursing-mother figurines, many systematically smashed. Long dismissed as Pagan dolls; [[margaret-barker]] argues they represent the Great Lady of the Temple.\n- **Kuntillet Ajrud inscriptions** (9th–8th century BC): \"Yahweh of Samaria and his Asherah\" and \"Yahweh of Teman and his Asherah.\" Direct inscriptional evidence of Yahweh-Asherah pairing.\n- **Ugaritic tablets** (Ras Shamra, 14th–13th c. BC): Asherah appears as the consort of El in the Canaanite pantheon — the direct antecedent of Israelite religion.\n- *Ashar* (not *Asherah*) in Hebrew inscriptions — \"the one who makes you happy / keeps you on the straight path.\" Root of *ashrey* (blessed/happy) — the opening of Psalm 1 and frame of Proverbs 3:13-18's Wisdom poem.\n\n### Names and titles\n\n| Title/Name | Translation | Where |\n|---|---|---|\n| *El Shaddai* | \"God with breasts\" | Genesis 17:1; 49:25; Patriarchal narratives |\n| *Asherah/Ashar* | \"The one who makes you happy / keeps you on the right path\" | Inscriptions; word-play in Proverbs |\n| The Lady / Great Lady (*Gevira*) | Queen Mother, great lady of the court | Deborah as Gevira (Judges 4) |\n| Wisdom (*Chokhmah*) | Personified divine feminine | Proverbs 3, 8: \"a tree of life to those who hold fast to her\" |\n| \"The Woman Who Dwelt in the Bush\" | Archaic feminine ending, Deuteronomy 33:16 | Burning bush = the Lady; associated with Mary in Orthodox tradition |\n| Queen of Heaven | Jeremiah 44 | Refugees worshipped her with incense, libations, loaves |\n\n### El Shaddai as the Lady's title\n\n*El Shaddai* is traditionally translated \"God Almighty\" but *shaddai* literally means \"breasts\" (*shad* = breast). Genesis 49:25 makes the wordplay explicit: Joseph's blessing invokes *Shaddai* alongside *shad* and *raham* (breasts and womb). The natural translation: \"the God with breasts.\"\n\n### The Tree of Life = Asherah\n\nThe Asherah in the temple was a stylized tree — Wisdom, the tree of life. Josiah removed and burned it. Proverbs 3:18 calls Wisdom \"a tree of life\" — framed with *ashrey* (blessed/happy), word-playing on the name Asherah. The original menorah (seven-branched lamp, made to resemble an almond tree) was probably the Lady's symbol; Josiah hid or destroyed it and replaced it.\n\nAdam losing the tree of life (Genesis 3) = losing the Lady. Adam was made from dust compacted into clay by a mist/fountain (*'ed*) — a title of the Lady. Without her water (lifegiving spring), Adam returns to dust. This is why Mary as \"life-giving spring\" is a major Orthodox icon — the Lady returning.\n\n### Suppression and survival\n\n**Suppressed by:** Hezekiah (~700 BC) and Josiah (623 BC). The Deuteronomists who wrote Kings labeled their actions righteous; the old believers (School of Isaiah, Damascus Document, Book of Enoch) called it apostasy.\n\n**Survived in:**\n- **Kabbalah**: The *Shekhinah* (divine indwelling presence, explicitly feminine) preserves the Lady in esoteric Judaism. On the [[kabbalistic-tree-of-life]], *Binah* (Understanding = the divine Mother, *Imma*) and *Malkuth* (Kingdom = the Shekhinah) both represent her.\n- **Christianity**: Mary inherits all titles of the Temple Lady (Theotokos, life-giving spring, gate of heaven, burning bush, tree of life). The Akathist Hymn preserves her attributes from pre-biblical sources.\n- **LDS theology**: Heavenly Mother is the restoration of the Lady. The Book of Mormon preserves *El Shaddai* imagery (Alma's authority from \"the Almighty God,\" Waters of Mormon = fountain + trees + beasts of Shaddai).\n\n| Ancient Israelite | LDS theology |\n|---|---|\n| El / Yahweh | Heavenly Father |\n| Asherah | Heavenly Mother |\n| Divine Son | Jesus Christ |\n\n## Connections\n\n- See also: [[divine-family]], [[deuteronomic-reform]], [[temple-theology]], [[school-of-isaiah]], [[kabbalistic-tree-of-life]], [[serpent-symbolism]], [[lehis-dream]]\n- Key sources: [[margaret-barker-divine-feminine]], [[what-did-josiah-reform-barker-byu]], [[family-of-heaven-dave-butler]]\n- Key entities: [[margaret-barker]], [[dave-butler]]\n\n## Open questions / tensions\n\n- The Ugaritic triad has Baal as the divine Son, but Baal is explicitly condemned in the OT. The *structural* claim (divine triad including Mother) can be historically grounded without requiring the Baal/Christ identification.\n- The \"Queen of Heaven\" in Jeremiah 44 — is she identical to Asherah or a distinct figure? Barker treats them as the same.\n- The LDS church does not prescribe prayer to Heavenly Mother. Barker's framework for the episode was explicitly \"descriptive, not prescriptive\" — paralleling this position.\n- Mark S. Smith (*The Early History of God*) and Barker's work are complementary; ingesting Smith directly would strengthen this page.\n- Genesis 49's explicit naming of Father, Mother, Son — Butler's specific exegetical claim not yet verified against the text.", "links": ["dave-butler", "deuteronomic-reform", "divine-family", "family-of-heaven-dave-butler", "kabbalistic-tree-of-life", "lehis-dream", "margaret-barker", "margaret-barker-divine-feminine", "school-of-isaiah", "serpent-symbolism", "temple-theology", "what-did-josiah-reform-barker-byu"]}, {"slug": "build-ai-second-brain-matt-wolfe", "folder": "sources", "type": "source", "category": "", "title": "Build An AI Second Brain Knowledge Base (Step-By-Step)", "author": "Matt Wolfe", "channel": "Matt Wolfe", "date": "2026-05-06", "url": "https://www.youtube.com/watch?v=yke4fLQUsh4", "tags": ["llm", "second-brain", "obsidian", "knowledge-management", "codex", "crm", "journaling"], "updated": "2026-06-26", "body": "# Build An AI Second Brain Knowledge Base (Step-By-Step)\n\n## Summary\n\nMatt Wolfe walks through building a Karpathy-inspired LLM wiki using Obsidian and OpenAI's Codex, then extends it with a journaling system and CRM on top. The journal is grounded in the wiki — when you journal, the agent searches the wiki for relevant saved content and grounds its response in what you've already read. The CRM lets you save notes about people you've met, queryable later. Key practical detail: he sets up a Codex automation to run hourly and process any new files in the `raw/` folder automatically.\n\n## Key takeaways\n\n- **Codex as the LLM agent** — Wolfe uses OpenAI's Codex (not Claude) as the IDE/agent. The workflow is identical in principle to what this wiki uses with Claude.\n- **Three pillars:** wiki/knowledge base (everything saved from the web), CRM (people and conversations), journal (grounded responses from the wiki).\n- **Journal grounding:** When journaling, the agent reads the wiki index, finds relevant pages, and responds with context from your saved sources rather than generic LLM output.\n- **Hourly automation:** Codex \"automations\" can check the `raw/` folder every hour and process new files automatically — the same idea that could be set up here.\n- **Channel name gap:** Wolfe ran into the same issue — web clipper doesn't auto-pull YouTube channel names. He added an instruction to the AGENTS.md to fetch and add the channel name, same fix already in this wiki's CLAUDE.md.\n- **processed/ folder:** Wolfe independently arrived at the same convention — after processing, move files to `raw/processed/` so the system knows what's been ingested.\n- **GitHub backup:** Commit the whole vault to a private GitHub repo after each hourly run for versioned backup.\n- **The wiki compounds:** As you ask questions, good answers get filed back as new wiki pages, so the knowledge base grows through queries as well as ingests.\n\n## Entities mentioned\n\n[[matt-wolfe]], [[andrei-karpathy]]\n\n## Concepts discussed\n\n[[llm-wiki-pattern]]\n\n## Contradictions / tensions with existing wiki\n\n- Wolfe uses Codex (OpenAI) rather than Claude. The architectures are equivalent; the tooling differs. No conceptual contradiction.\n- Wolfe's automation runs hourly and processes without human review — this trades human-in-the-loop discussion for convenience. The trade-off is noted in [[llm-wiki-pattern]].\n\n## Quotes worth keeping\n\n> \"Most second brain systems are just like storage, right? You dump your YouTube transcripts and articles and podcasts and just everything... Problem is, that's kind of where the information just goes to die.\"\n\n> \"When I journal, I want it to pull from the knowledge that I've saved, making it more tailored to exactly what interested me and what I found valuable over time.\"", "links": ["andrei-karpathy", "llm-wiki-pattern", "matt-wolfe"]}, {"slug": "craig-manning", "folder": "entities", "type": "entity", "category": "person", "title": "Craig Manning", "author": "", "channel": "", "date": "", "url": "", "tags": ["mental-performance", "psychology", "coaching", "nba", "olympics", "lds"], "updated": "2026-06-26", "body": "# Craig Manning\n\nMental performance scientist, author of *The Fearless Mind*, and coach to Olympic athletes, NBA teams, and Fortune 500 companies. Adjunct Professor of Performance Psychology at BYU.\n\n## Overview\n\nCraig Manning has spent 30+ years studying and applying the science of human performance. His core insight: performance is not primarily about talent or training, but about eliminating mental interference — specifically, ego-orientation and self-doubt. He is best known for the task vs. ego framework and the performance equation: Potential + Training − Interference = Performance.\n\n## Key facts\n\n- Author: *The Fearless Mind* (bestseller)\n- Academic: Adjunct Professor of Performance Psychology, BYU; Mental Performance Consultant for BYU athletics\n- Clients: US Olympic Ski/Snowboarding teams, Red Bull High Performance, Milwaukee Bucks (NBA), various other NBA teams; corporate clients worldwide\n- Personal: Father died of cancer at 52 (diagnosed at 48); this shaped his philosophy of urgency and deliberate use of time\n- Background: Played tennis professionally and collegiately; three-time Conference Coach of the Year at a Division 1 university\n- Based in Utah; Australian origin (\"from Australia, where crocodiles are from\")\n\n## Core framework\n\nSee [[task-vs-ego-orientation]] and [[mental-performance]] for full details. Summary:\n- Ego-orientation = outcome-seeking, approval-seeking, fear-driven → chokes under pressure\n- Task-orientation = skill-focused, humble, process-driven → consistent performer\n- The Seinfeld chain method: consistency of daily action conditions the subconscious\n- Self-belief is the #1 skill: proactive (\"I can, I will\") not just positive thinking\n\n## Connections\n\n- Related to: [[task-vs-ego-orientation]], [[mental-performance]]\n- Appears in: [[craig-manning-d2dcon-power-of-mind]], [[craig-manning-overcoming-egos-tedxbyu]]\n\n## Notes / open questions\n\n- Worth finding his full work on \"profiling\" — he mentions 5 performance profiles used for NBA draft evaluation\n- His observation that \"the more experience you have, the worse your performance gets\" (due to coasting) is a strong counterintuitive claim worth tracking", "links": ["craig-manning-d2dcon-power-of-mind", "craig-manning-overcoming-egos-tedxbyu", "mental-performance", "task-vs-ego-orientation"]}, {"slug": "craig-manning-d2dcon-power-of-mind", "folder": "sources", "type": "source", "category": "", "title": "Craig Manning - D2DCON - Power of The MIND", "author": "Craig Manning", "channel": "D2D Experts", "date": "2019-01-12", "url": "https://www.youtube.com/watch?v=lKY8GObMh1g", "tags": ["mental-performance", "mindset", "psychology", "human-performance", "self-belief", "procrastination"], "updated": "2026-06-26", "body": "# Craig Manning - D2DCON - Power of The MIND\n\n## Summary\n\nCraig Manning — mental performance coach, author of *The Fearless Mind*, consultant to NBA teams and Olympic athletes — delivers a talk on the science of human performance. He argues that performance is not about talent or positivity but about doing: the consistent, deliberate action that conditions the subconscious and eliminates interference. Key framework: the performance equation is Potential + Training − Interference = Performance. Self-doubt, negative intelligence, and worrying about others are the three greatest sources of interference.\n\n## Key takeaways\n\n- **The performance equation:** Potential + Training − Interference = Performance. Most people have the potential and the training — what holds them back is interference (overthinking, self-doubt, comparing to others).\n- **Four intelligences:** Spiritual (purpose/direction), Emotional (energy/passion), Mental (how you use your mind), Physical (the doing). All four are needed; the physical doing is the output of the other three.\n- **The action hierarchy:** Subtractive patterns (focus on what not to do) → Negative thoughts → Positive thoughts → **Additive patterns** (actionable, proactive focus on what to do). Only additive patterns actually change performance. Positive thinking is not enough — it has no action connected to it.\n- **The Seinfeld Chain:** Commit to doing one thing every day. Cross it off on a calendar. The consistency is the performance. Don't break the chain. (\"Keep the chain alive\" — not \"don't break the chain,\" since the mind can't process negatives.)\n- **Practice makes permanent, not perfect.** Practice the wrong things and you get worse. Be deliberate about what you choose to condition.\n- **Self-belief as the core skill.** The greatest source of interference is self-doubt — it's actionable and negative (subtractive pattern). Self-belief is the counterforce: \"I can do this, I will do this\" — proactive words that lead to action.\n- **The 3-2-1 review:** End of each day, ask: 3 things I did well, 1 thing I can do better. Gets the learning in your head (where it's useful), not just in notes.\n- **Time is the greatest asset.** Manning's father died at 52; he turned 48 the day before this talk. His entire philosophy is shaped by urgency about what you choose to do with your time.\n\n## Entities mentioned\n\n[[craig-manning]]\n\n## Concepts discussed\n\n[[mental-performance]], [[task-vs-ego-orientation]]\n\n## Contradictions / tensions with existing wiki\n\nNone — first mental performance source.\n\n## Quotes worth keeping\n\n> \"It is the consistency of what you do that creates the patterns, and the patterns are the habits that define who we are.\"\n\n> \"Practice does not make perfect. Practice makes permanent. Be very careful what you choose to work on.\"\n\n> \"The formula for success is not potential plus training. It's potential plus training minus interference.\"\n\n> \"At the great end of life, it's not knowledge. It's action. It's what you do that defines you.\" — Thomas Henry Huxley (cited by Manning)", "links": ["craig-manning", "mental-performance", "task-vs-ego-orientation"]}, {"slug": "cross-purposes", "folder": "entities", "type": "entity", "category": "product", "title": "Cross Purposes: Christianity's Broken Bargain with Democracy", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "religion", "politics", "democracy", "Christianity"], "updated": "2026-06-27", "body": "# Cross Purposes: Christianity's Broken Bargain with Democracy\n\nJonathan Rauch's argument that Christianity's relationship with American democracy has fractured and what that means for the republic.\n\n## Overview\nRauch examines the historical \"bargain\" by which Christianity provided moral grounding and civic virtue for American democracy — and argues that this relationship has broken down, with consequences for both institutions. A rare perspective in this wiki: a secular political analysis of Christian civic influence.\n\n## Key facts\n- Author: Jonathan Rauch\n- Genre: Politics / Religion & Society\n- Published: 2025\n- Length (audiobook): ~4.5 hours remaining\n\n## Connections\n- Related to: [[jonathan-rauch]]\n- See also: [[epistemic-diversity]] (counterweight to LDS-centric sources in this wiki)\n\n## Notes / open questions\n- Potential counterweight source to the predominantly LDS theological material in this wiki\n- Rauch is a secular liberal thinker; represents a different tradition than most sources here\n- Worth ingesting as a full source to capture the argument properly", "links": ["epistemic-diversity", "jonathan-rauch"]}, {"slug": "dave-butler", "folder": "entities", "type": "entity", "category": "person", "title": "Dave Butler", "author": "", "channel": "", "date": "", "url": "", "tags": ["lds", "book-of-mormon", "hebrew", "ancient-israel", "author", "scholar"], "updated": "2026-06-26", "body": "# Dave Butler\n\nLDS author and scripture scholar; author of *In the Language of Adam*; frequent collaborator on The Stick of Joseph channel. Specializes in ancient Near Eastern context for Book of Mormon and Old Testament.\n\n## Overview\n\nDave Butler is one of the core scholarly voices on [[the-stick-of-joseph]] channel. His book *In the Language of Adam* explores the ancient Hebrew linguistic and symbolic foundations of Book of Mormon language. He frequently appears alongside hosts Hayden and Mike Day to bring deep Old Testament and Near Eastern scholarly context to LDS scripture discussions.\n\n## Key facts\n\n- Author: *In the Language of Adam* (Plain & Precious Publishing)\n- Academic orientation: Old Testament, ancient Israelite religion, Ugaritic texts, documentary hypothesis (E/J traditions), second temple period\n- Mission: Italy\n- Regular presence on: [[the-stick-of-joseph]] (essentially a co-host, not just a guest)\n- Collaborates with: Mike Day on serpent/seraph research\n\n## Key contributions seen in sources\n\n- Divine family in ancient Israelite theology: God as Father, Mother, Son; pre-dates Joseph Smith; evidenced in Ugaritic tablets and Genesis 49\n- Serpent symbolism: seraph/nachash distinction; Numbers 21 as northern (E) text; Christ as the divine healing serpent of John 3:14\n- The Book of Mormon as a northern tribal record (Manasseh/Ephraim)\n\n## Connections\n\n- Related to: [[the-stick-of-joseph]], [[mike-day]]\n- Concepts: [[divine-family]], [[serpent-symbolism]], [[pardes]]\n- Appears in: [[family-of-heaven-dave-butler]], [[ancient-meaning-of-serpent-stick-of-joseph]]\n- Referenced by: [[rob-kay]] (in [[jewish-convert-decodes-lehis-dream-rob-kay]])\n\n## Notes / open questions\n\n- Worth reading *In the Language of Adam* — referenced across multiple episodes as a key text\n- His reading of Genesis 49 as explicitly mentioning the divine family (Father, Mother, Son) is a specific claim worth verifying", "links": ["ancient-meaning-of-serpent-stick-of-joseph", "divine-family", "family-of-heaven-dave-butler", "jewish-convert-decodes-lehis-dream-rob-kay", "mike-day", "pardes", "rob-kay", "serpent-symbolism", "the-stick-of-joseph"]}, {"slug": "deuteronomic-reform", "folder": "concepts", "type": "concept", "category": "", "title": "Deuteronomic Reform", "author": "", "channel": "", "date": "", "url": "", "tags": ["josiah", "deuteronomy", "first-temple", "second-temple", "asherah", "reform", "ancient-israel", "temple-theology"], "updated": "2026-06-27", "body": "# Deuteronomic Reform\n\nKing Josiah's 623 BC purge of the Jerusalem temple, which [[margaret-barker]] and other scholars argue was not a restoration of true religion but an erasure of the richer first-temple theology — removing the divine feminine (Asherah), angels, visions of God, the Melchizedek tradition, and the Day of Atonement's inner meaning. The Old Testament as we have it was largely edited by the Deuteronomists, who won this battle.\n\n## Explanation\n\nThe Book of Deuteronomy (the \"law book\" supposedly discovered in the temple during Josiah's reign, 2 Kings 22) served as the manifesto for a reform movement that had been gaining power in Jerusalem since roughly 750 BC. Josiah implemented it fully in 623 BC. The effects:\n\n### What was removed\n\n| Item | Biblical reference | Significance |\n|---|---|---|\n| The Asherah (stylized tree) | 2 Kings 23:6 | Symbol of Wisdom, the Lady, the tree of life |\n| The true Menorah | Hidden (Babylonian Talmud) | The seven-branched lamp; what the second temple had was a replacement |\n| The Ark of the Covenant | Hidden (2 Chron 35) | Josiah hid the ark before the Babylonians came |\n| Anointing oil, manna jar, Aaron's rod | Hidden | Holy of Holies contents |\n| Angel priests (\"houses of the prostitutes\") | 2 Kings 23:7 | Hebrew letters read equally as \"holy ones/angels\" |\n| Visions of God | — | Deuteronomy 4: \"you saw no form, only a voice\" |\n| Wisdom as a divine figure | — | In Deuteronomy, wisdom = the law; in Proverbs, Wisdom is a person/lady |\n| The Queen of Heaven | Not named in Josiah account | Jeremiah 44: refugees said disaster came *because* they stopped worshipping her |\n| Melchizedek tradition | 1 line survives (Psalm 110) | Melchizedek was divine/messianic; found in Dead Sea Scrolls |\n| The Day of Atonement's meaning | — | Deuteronomy lacks the Day of Atonement; its inner meaning was lost in the second temple |\n| Hilltop shrines, sacred trees, sacred pillars | 2 Kings 18 (Hezekiah), 2 Kings 23 | These were features of the patriarchal religion Abraham practiced |\n\n### What the old believers (non-Deuteronomists) said\n\nThe Damascus Document, Book of Enoch, and other non-canonical texts describe the second-temple worshippers as an **\"apostate generation\"** whose offerings were impure and whose teachers were not chosen by God. Their Apocalypse of Weeks marks the turning point in Israel's history not as the Babylonian exile but as the moment when \"all who lived in the temple forsook wisdom and lost their vision\" — corresponding to Isaiah's ascension and the subsequent reform.\n\n### The history was rewritten\n\nThe Deuteronomists wrote the histories (Samuel, Kings). Kings who followed old-believer religion (Ahaz, Manasseh) are labeled \"wicked.\" Kings who followed Deuteronomist religion (Hezekiah, Josiah) are labeled \"good\" — even though Hezekiah destroyed Nehushtan (the bronze serpent) and began the erasure of first-temple symbols, and even though the Babylonian destruction followed Josiah's reforms by 25 years.\n\nChronicles (*Paralipomenon* = \"the things left out\") preserves what Kings omitted: the golden chariot of the cherubim, the musical prophet-priests (angel-priests), the prophetic function of David's three singing guilds.\n\n## Barker's analogy\n\nThe Deuteronomic reform was exactly like the Protestant Reformation in Europe: statues smashed, images whitewashed over, pillar shrines destroyed, a simpler, more purely text-based religion imposed. King Edward VI modeled himself explicitly on Josiah.\n\n## Connection to the Book of Mormon\n\nThe brass plates taken by Lehi's family from Jerusalem were compiled *before* Josiah's reforms fully took hold (Lehi leaves c. 600 BC). They therefore preserve:\n- The serpent-on-a-pole tradition (Numbers 21) that Hezekiah had already attacked with Nehushtan's destruction\n- The divine family theology (El Shaddai = \"God with breasts\")\n- Isaiah's complete text (all 66 chapters, preserved by the School of Isaiah)\n- The northern (E-source/Ephraim/Manasseh) tradition more broadly\n\nThis explains why the Book of Mormon preserves things the post-Josiah Bible doesn't.\n\n## Connections\n\n- See also: [[asherah]], [[temple-theology]], [[school-of-isaiah]], [[serpent-symbolism]], [[divine-family]], [[kabbalah]]\n- Key sources: [[what-did-josiah-reform-barker-byu]], [[margaret-barker-school-of-isaiah]], [[margaret-barker-divine-feminine]]\n- Key entities: [[margaret-barker]], [[dave-butler]], [[mike-day]]\n\n## Open questions / tensions\n\n- Was Josiah genuinely sincere, or was he manipulated by reformers who used him as a 12-year-old figurehead? Barker suggests the latter.\n- Does the archaeological evidence (Judean pillar figurines, Kuntillet Ajrud inscriptions \"Yahweh and his Asherah\") support Barker's reconstruction? The mainstream archaeological consensus seems to be moving in her direction.\n- The \"prostitutes\" / \"holy ones\" textual ambiguity — is this Barker's reading or broader scholarship?\n- How much of first-temple theology survived in the Dead Sea Scroll community? They call themselves the true Israel preserving the old covenant.", "links": ["asherah", "dave-butler", "divine-family", "kabbalah", "margaret-barker", "margaret-barker-divine-feminine", "margaret-barker-school-of-isaiah", "mike-day", "school-of-isaiah", "serpent-symbolism", "temple-theology", "what-did-josiah-reform-barker-byu"]}, {"slug": "divine-family", "folder": "concepts", "type": "concept", "category": "", "title": "Divine Family", "author": "", "channel": "", "date": "", "url": "", "tags": ["divine-family", "heavenly-mother", "ancient-israel", "ugarit", "lds-theology", "platonism", "monotheism", "yahweh"], "updated": "2026-06-26", "body": "# Divine Family\n\nThe pre-Platonic, ancient Israelite conception of God as a family of beings — a divine Father, Mother, and Son — rather than an abstract singular absolute. This is attested in Ugaritic tablets and traces in the Old Testament (Genesis 49), and is argued by LDS scholars to be the original theology that Joseph Smith restored rather than invented.\n\n## Explanation\n\nAncient Israelite religion, at its earliest recoverable layers, understood the divine not as a singular, abstract, philosophical \"good\" or \"unmoved mover,\" but as a *family of beings*: a divine Father (El/Yahweh), a divine Mother (Asherah), and a Son. This conception:\n\n1. Predates the Greek philosophical influence that shaped later Christianity\n2. Is evidenced in Ugaritic texts (14th–13th century BC) from Ras Shamra\n3. Has textual traces in the Old Testament that survived later monotheistic reforms\n4. Is most explicit in Genesis 49, per [[dave-butler]]\n5. Is the framework Joseph Smith articulated in Nauvoo (Heavenly Father, Heavenly Mother, Christ as Son)\n\n## The Platonic Corruption of Israelite Theology\n\nEarly Jewish and Christian intellectuals — notably Philo of Alexandria — merged Israelite theology with Greek philosophy to be \"respectable\" in the Greco-Roman world:\n\n| Greek Concept | God as... | Problem |\n|---|---|---|\n| Platonic (Plato) | The Form of Goodness; everything else is good only as a copy of God | Completely abstract; no personal qualities; impossible to relate to |\n| Aristotelian (Aristotle) | The unmoved mover; the eternal cause behind all motion | Mechanistic; no relationship possible |\n\nThese two Greek concepts became the backbone of orthodox Christian theology (the Nicene Creed's God is \"without body, parts, or passions\"). The irony [[dave-butler]] highlights: most Christians *pray* to a personal Father anyway, even while their doctrine says God is an abstraction. Their hearts preserve the ancient theology their heads reject.\n\n## Israel Was Not Always Monotheistic\n\nScholarship (Mark S. Smith, *The Early History of God*; Ugaritic text studies) shows that first-temple Israelites accepted:\n- Yahweh as the chief deity of Israel\n- A divine consort (Asherah — literally found in temple inscriptions as \"Yahweh and his Asherah\")\n- A divine council of sons of God (*bene Elohim*)\n\nThe strict monotheism of later Israel (1 God only, no other divine beings) was a reform, associated with the reforms of Hezekiah (c. 700 BC) and Josiah (c. 620 BC), not the original theology.\n\n## Connection to Kabbalistic Sefirot\n\nThe divine family (Father, Mother, Son) maps structurally onto the upper triad of the [[kabbalistic-tree-of-life]]:\n- Keter (Crown) — the unknowable divine source\n- Chokmah (Wisdom) — the divine Father, Abba, masculine aspect\n- Binah (Understanding) — the divine Mother, Imma, feminine aspect; the Shekhinah as the feminine presence of God\n\nThe Kabbalistic tradition thus preserves, in esoteric form, the ancient Israelite theology of a divine family — the same theology [[kabbalah]] describes as layered behind the written Torah.\n\n## LDS Implications\n\nThe LDS doctrine of Heavenly Father, Heavenly Mother, and Jesus Christ as a divine family is thus not a 19th-century invention but the restoration of:\n1. Ancient Israelite theology (pre-Platonic)\n2. Ugaritic-attested divine family structure\n3. A theology that ordinary Christians practice in prayer even when their creeds deny it\n\nBeing \"family-centered\" and \"Christ-centered\" are the same thing — the family of heaven *is* the structure within which Christ operates.\n\n## Connections\n\n- See also: [[kabbalah]], [[kabbalistic-tree-of-life]], [[serpent-symbolism]]\n- Used by: [[dave-butler]], [[the-stick-of-joseph]]\n- Evidenced in: [[family-of-heaven-dave-butler]], [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Open questions / tensions\n\n- Butler cites Genesis 49 as explicitly mentioning the Father, Mother, and Son — this is a specific exegetical claim worth verifying with the text\n- The Ugaritic El/Asherah/Baal triad: how closely does this map onto the LDS Heavenly Father/Mother/Son structure? Is the Baal connection a problem?\n- How does the divine council (*bene Elohim* / sons of God) fit into this family structure?\n- Mark S. Smith's *The Early History of God* is the key scholarly source — worth reading directly", "links": ["dave-butler", "family-of-heaven-dave-butler", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "serpent-symbolism", "the-stick-of-joseph"]}, {"slug": "epistemic-diversity", "folder": "concepts", "type": "concept", "category": "", "title": "Epistemic Diversity", "author": "", "channel": "", "date": "", "url": "", "tags": ["epistemology", "bias", "critical-thinking", "wiki-methodology", "source-diversity"], "updated": "2026-06-26", "body": "# Epistemic Diversity\n\nThe deliberate practice of exposing a knowledge base to multiple, competing perspectives — including counterarguments — so that conclusions are earned rather than inherited from a narrow source pool.\n\n## Explanation\n\nA wiki built from a single tradition, channel, or ideological community risks becoming an echo chamber: internally consistent, but insulated from challenge. Epistemic diversity is the antidote. It does not mean treating all perspectives as equally valid — it means ensuring that strong claims in the wiki have been tested against the best available objections.\n\nThere are three layers where diversity can break down:\n\n1. **Source diversity** — All sources come from the same author, channel, community, or worldview.\n2. **Framing diversity** — Sources cover the same topic but frame it identically (e.g., all treat task-orientation as unambiguously good without examining limits).\n3. **Contradiction visibility** — Two sources disagree, but the conflict is never surfaced, so the wiki implicitly resolves it in favor of whichever source was ingested first.\n\n## Contradiction Detection\n\nThe wiki's primary tool for contradiction detection is the **Contradictions / tensions with existing wiki** section in every source summary page. When a new source is ingested, this field should be filled deliberately — not left blank by default.\n\nTypes of contradictions to watch for:\n\n| Type | Example |\n|------|---------|\n| **Direct factual conflict** | Source A: \"Lehi's dream is purely literal.\" Source B: \"Lehi's dream encodes Kabbalistic structure.\" |\n| **Framing conflict** | Source A treats ego as purely destructive. Source B treats ego as necessary for motivation at low arousal levels. |\n| **Emphasis conflict** | Source A emphasizes daily habits. Source B emphasizes mindset shifts. Both may be compatible but prioritize differently. |\n| **Scope conflict** | Source A's claim is universal; Source B shows it only holds in a specific context. |\n\nWhen a contradiction is found, the right response is **not** to silently overwrite the older claim. Instead: update both pages to note the tension, and flag it as an open question.\n\n## Counterweight Sources\n\nA counterweight source is one ingested *specifically* to challenge a claim already in the wiki. The ingest workflow applies normally, but the source summary should note its counterweight role in the summary section.\n\nCandidates for counterweight sourcing:\n- Academic meta-analyses that test practitioner claims (e.g., sport psychology research on task/ego orientation)\n- Sources from a different tradition covering the same subject (e.g., a non-LDS reading of the Tree of Life)\n- Critics of a framework your wiki endorses (e.g., a critique of the Seinfeld Chain habit method)\n\n## Lint Checks for Bias\n\nDuring a LINT pass, look for:\n\n- [ ] **Echo chamber pattern** — 3+ sources from the same channel or author with no counterweight\n- [ ] **Uncontested claims** — Major claims on concept pages with no *Open questions* or *tensions* entries\n- [ ] **Empty contradiction fields** — Source summary pages where *Contradictions / tensions* is blank\n- [ ] **Missing counterweight** — A concept page that only references one tradition or school of thought\n- [ ] **Implicit resolution** — Two sources disagree, but the concept page presents only one view without noting the dispute\n\n## Connections\n\n- See also: [[llm-wiki-pattern]]\n- Relevant to: [[mental-performance]], [[task-vs-ego-orientation]], [[lehis-dream]]\n\n## Open questions / tensions\n\n- How aggressively should counterweight sources be added? Too many could dilute focus; too few risks confirmation bias.\n- Should contradictions ever be *resolved* in the wiki, or always left open? Provisional resolution with clear reasoning may be better than permanent ambiguity.", "links": ["lehis-dream", "llm-wiki-pattern", "mental-performance", "task-vs-ego-orientation"]}, {"slug": "exodus-endowment", "folder": "entities", "type": "entity", "category": "product", "title": "Exodus Endowment", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "LDS", "scripture", "temple", "typology"], "updated": "2026-06-27", "body": "# Exodus Endowment\n\nRussell McConkie's study of the typological parallels between the Exodus narrative and Latter-day Saint temple endowment.\n\n## Overview\nExplores how the Israelite Exodus from Egypt prefigures and illuminates the LDS temple endowment ceremony. Traces the typological patterns of covenant, initiation, ascension, and divine encounter across both narratives.\n\n## Key facts\n- Author: Russell McConkie\n- Genre: LDS Scripture Study / Temple Studies\n- Length (audiobook): ~2 hours 11 minutes\n\n## Connections\n- Related to: [[russell-mcconkie]]\n- See also: [[divine-family]], [[serpent-symbolism]], [[kabbalah]]\n- Thematically adjacent to: [[pardes]], [[lehis-dream]]\n\n## Notes / open questions\n- Short but dense; likely a focused typological argument rather than a broad survey", "links": ["divine-family", "kabbalah", "lehis-dream", "pardes", "russell-mcconkie", "serpent-symbolism"]}, {"slug": "faith-and-doubt", "folder": "concepts", "type": "concept", "category": "", "title": "Faith and Doubt", "author": "", "channel": "", "date": "", "url": "", "tags": ["faith", "doubt", "belief", "testimony", "lds", "holland", "integrity"], "updated": "2026-06-27", "body": "# Faith and Doubt\n\nThe relationship between belief and uncertainty in religious life. Both [[jeffrey-r-holland]] (LDS apostle) and [[jordan-b-peterson]] (psychologist) converge on the same insight from different angles: lead with what you believe and can do, not with what you doubt and cannot; and the reaching-into-the-unknown that constitutes genuine faith is structurally the same as the reaching that constitutes genuine science.\n\n## Explanation\n\n### Holland's Framework (Mark 9:14-29)\n\nThe scriptural account: a father brings his afflicted son to Jesus's disciples, who fail to heal him. The father says: \"If thou canst do anything, have compassion on us, and help us.\" Jesus: \"If thou canst believe, all things are possible to him that believeth.\" The father: \"Lord, I believe; help thou mine unbelief.\"\n\nHolland draws three principles:\n\n**1. Lead with your strength, not your weakness.**\nThe father says \"Lord, I believe\" *before* acknowledging his doubt. This sequencing matters: assert what faith you have first, then acknowledge the gap. Not \"I have too many doubts but I sort of believe\" — but \"I believe; now help the part that doesn't yet.\"\n\n**2. Integrity toward existing faith is the measure, not quantity.**\nThe size of your faith is not the issue. A mustard seed is enough to move mountains — but it must be a *real* mustard seed, truly believed, not a pretended one. \"The integrity you demonstrate toward the faith you do have and the truth you already know.\"\n\n**3. Don't hyperventilate when questions arise.**\nHold the ground you've already won. Stand firm on what you know until additional knowledge comes. Don't let unanswered questions displace answered ones.\n\n### Peterson's Framework (Science as Prayer)\n\nPeterson arrives at similar territory from clinical psychology and mythology. A real scientific problem is one that **won't let you go** — it grips you by something beyond your control. The scientific process:\n\n1. A problem that besets you (you didn't choose it — it chose you)\n2. An admission of insufficiency (\"I don't know the answer\")\n3. A reaching into the unknown for revelation\n4. Critical testing of what comes back\n\nThis is structurally identical to prayer. \"That's really what prayer is in the final analysis — an admission of insufficiency and a reaching into the beyond for a revelation.\" The thought that moderns call \"hypothesis generation\" is historically a descendant of prayer.\n\n### The convergence\n\nBoth frameworks resist two failure modes:\n- **Performative doubt** (treating skepticism as higher moral courage than belief)\n- **Performative certainty** (pretending to more faith than you have)\n\nBoth frameworks prescribe a third path: genuine, honest engagement with the unknown from the firm ground of what you already know — and a willingness to acknowledge that what grips you may be exactly what you were made to pursue.\n\n## Contrast: Ivan vs. Alyosha (Dostoevsky)\n\nPeterson's framing of Ivan Karamazov: Ivan wins all the arguments. He mounts the most powerful atheist case in literature (the suffering of children). But Alyosha is the better man. \"Just winning the argument doesn't mean you're right.\" Ivan's brilliant intellect breeds the pride that becomes his downfall. Alyosha's faith is not argumentatively superior but *practically* superior — he lives better. This parallels [[task-vs-ego-orientation]]: the ego-level (argument-winning) and the task-level (who actually becomes a better person) are different registers.\n\n## Connections\n\n- See also: [[task-vs-ego-orientation]], [[mental-performance]], [[stories-as-hierarchies-of-value]]\n- Key entities: [[jeffrey-r-holland]], [[jordan-b-peterson]]\n- Evidenced in: [[lord-i-believe-jeffrey-holland]], [[the-problem-that-wont-let-you-go-peterson]]\n\n## Open questions / tensions\n\n- Is Peterson's \"wrestling with God\" framework compatible with traditional LDS theology, or does it represent a different kind of God (archetypal rather than personal)?\n- Holland explicitly says \"I am not asking you to pretend to faith you do not have\" — how does this interact with the practice of \"acting as if\" recommended in some religious teaching?\n- Both sources emphasize a God who is genuinely responsive (Holland: God will send help from both sides of the veil; Peterson: ask and you will receive). How does this contrast with abstract Christian monotheism? See [[divine-family]].", "links": ["divine-family", "jeffrey-r-holland", "jordan-b-peterson", "lord-i-believe-jeffrey-holland", "mental-performance", "stories-as-hierarchies-of-value", "task-vs-ego-orientation", "the-problem-that-wont-let-you-go-peterson"]}, {"slug": "if-poem-rudyard-kipling", "folder": "sources", "type": "source", "category": "", "title": "If—", "author": "Rudyard Kipling", "channel": "", "date": "1895-01-01", "url": "https://poets.org/poem/if", "tags": ["poetry", "stoicism", "character", "virtue", "manhood", "resilience"], "updated": "2026-06-27", "body": "# If—\n\n## Summary\n\nRudyard Kipling's 1895 poem addressed to his son — a distillation of the stoic virtues required to be a man of character. Each stanza opens \"If you can...\" and builds a portrait of someone who can hold equanimity under pressure, treat triumph and disaster as impostors, keep virtue among crowds and kings, and fill every moment with purposeful action. The final reward: \"Yours is the Earth and everything that's in it.\"\n\n## Key takeaways\n\n- **Equanimity under pressure.** Keep your head when others lose theirs; trust yourself when others doubt you but make allowance for their doubting too.\n- **Triumph and disaster are impostors.** Neither success nor failure should destabilize the core. They are both transitory; the self that persists through both is what matters.\n- **Hold on when there is nothing left.** \"And so hold on when there is nothing in you / Except the Will which says to them: 'Hold on.'\"\n- **Don't make dreams your master, nor thoughts your aim.** Dreams and thinking are tools, not ends in themselves — another echo of task vs. ego orientation.\n- **Fill the unforgiving minute.** \"If you can fill the unforgiving minute / With sixty seconds' worth of distance run.\" Time is the ultimate constraint; use it fully.\n- **Keep the common touch with kings.** Walk with kings without losing your virtue; talk with crowds without losing yourself. Neither fame nor obscurity should change you.\n- **Patience is active, not passive.** \"If you can wait and not be tired by waiting.\"\n\n## Entities mentioned\n\n*(None in wiki — Rudyard Kipling not yet an entity page)*\n\n## Concepts discussed\n\n[[task-vs-ego-orientation]], [[mental-performance]]\n\n## Contradictions / tensions with existing wiki\n\nClosely parallels [[task-vs-ego-orientation]]: Kipling's \"treat triumph and disaster as impostors\" is the poetic version of Manning's instruction not to be outcome-oriented. The \"Will which says 'Hold on'\" when there is nothing left maps to Manning's additive self-belief pattern.\n\n## Quotes worth keeping\n\n> \"If you can meet with Triumph and Disaster / And treat those two impostors just the same\"\n\n> \"And so hold on when there is nothing in you / Except the Will which says to them: 'Hold on'\"\n\n> \"If you can fill the unforgiving minute / With sixty seconds' worth of distance run— / Yours is the Earth and everything that's in it\"\n\n> \"If you can dream—and not make dreams your master; / If you can think—and not make thoughts your aim\"", "links": ["mental-performance", "task-vs-ego-orientation"]}, {"slug": "in-the-language-of-adam", "folder": "entities", "type": "entity", "category": "product", "title": "In the Language of Adam", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "LDS", "scripture", "ancient-language", "symbolism"], "updated": "2026-06-27", "body": "# In the Language of Adam\n\nD. John Butler's study of the symbolic and linguistic structure underlying ancient scripture, particularly as it relates to the LDS restoration.\n\n## Overview\nExplores the idea that ancient scripture — including the Book of Mormon and Old Testament — is encoded in a symbolic \"adamic\" language that carries deeper meaning than surface readings reveal. Butler is a recurring scholar on [[the-stick-of-joseph]] channel.\n\n## Key facts\n- Author: D. John Butler (Dave Butler)\n- Genre: LDS Scripture Study / Symbolism\n- Length (audiobook): finished (completed in library)\n\n## Connections\n- Related to: [[dave-butler]]\n- Evidenced in: [[family-of-heaven-dave-butler]]\n- See also: [[serpent-symbolism]], [[divine-family]], [[pardes]], [[kabbalah]]\n\n## Notes / open questions\n- Dave Butler is already an established entity in this wiki from his YouTube appearances\n- This book is a primary reference for his scholarly framework", "links": ["dave-butler", "divine-family", "family-of-heaven-dave-butler", "kabbalah", "pardes", "serpent-symbolism", "the-stick-of-joseph"]}, {"slug": "jeffrey-r-holland", "folder": "entities", "type": "entity", "category": "person", "title": "Jeffrey R. Holland", "author": "", "channel": "", "date": "", "url": "", "tags": ["lds", "apostle", "general-conference", "faith", "testimony"], "updated": "2026-06-27", "body": "# Jeffrey R. Holland\n\nMember of the Quorum of the Twelve Apostles of The Church of Jesus Christ of Latter-day Saints. Former president of BYU. Known for emotionally powerful General Conference addresses.\n\n## Overview\n\nJeffrey R. Holland is one of the most recognized voices in contemporary LDS teaching. His addresses are noted for their emotional depth, scriptural rootedness, and willingness to address hard questions of faith and doubt directly.\n\n## Key contributions seen in wiki sources\n\n- \"Lord, I Believe\" (April 2013 General Conference): lead with your belief, not your doubt; integrity toward existing faith matters more than quantity of faith; belief is always the first step toward conviction.\n\n## Connections\n\n- Concepts: [[faith-and-doubt]]\n- Appears in: [[lord-i-believe-jeffrey-holland]]", "links": ["faith-and-doubt", "lord-i-believe-jeffrey-holland"]}, {"slug": "jewish-convert-decodes-lehis-dream-rob-kay", "folder": "sources", "type": "source", "category": "", "title": "Jewish Convert Decodes the Hidden Hebrew Elements of Lehi's Dream | Rob Kay", "author": "Rob Kay", "channel": "The Stick of Joseph", "date": "2026-06-07", "url": "https://www.youtube.com/watch?v=eSuvl0ow36k", "tags": ["book-of-mormon", "kabbalah", "hebrew", "lehi-dream", "tree-of-life", "mysticism"], "updated": "2026-06-26", "body": "# Jewish Convert Decodes the Hidden Hebrew Elements of Lehi's Dream | Rob Kay\n\n## Summary\n\nRob Kay — a Jewish convert to the LDS church with 30+ years of membership and deep expertise in ancient Hebrew, Kabbalah, and Merkaba mysticism — walks through Lehi's Dream from the Book of Mormon through the lens of ancient Israelite prophetic tradition. He argues that Lehi's Vision of the Tree of Life maps precisely onto the Kabbalistic Sefirot (Tree of Life structure), and that the Book of Mormon's symbolic language draws from the same ancient prophetic science that runs through Enoch, Moses, and the Hebrew prophetic schools — encoded in a way that Western/gentile readers systematically miss.\n\n## Key takeaways\n\n- **Lehi's Dream = Kabbalistic Sefirot map.** The tree, the river, the iron rod, the great and spacious building, the forbidden paths, and the mists of darkness all correspond to specific elements of the Sefirot and the Heikhalot (palace) mystical ascent literature.\n- **First Nephi is an Exodus narrative.** The structure of the book follows the pattern of the Israelite Exodus — wilderness, chaos, ascent toward the promised land — which is itself a template for personal spiritual transformation.\n- **PaRDeS: 4 levels of interpretation.** The Hebrew acronym for four levels — Peshat (literal), Remez (hint/allegory), Derash (commentary), Sod (mystery/mystical) — applies directly to Book of Mormon reading. Each level is simultaneously true.\n- **The Iron Rod is a branch of the Tree of Life.** Specifically the Gevurah (judgment/strength) branch, and also parallels Moses's rod (Mateh Elohim, \"the rod of God\") which bore the 72 Names of God. \"Hold to the iron rod\" means grip the divine word/names that connect you to God.\n- **The Great and Spacious Building = the \"flying lamed.\"** In Hebrew symbolism a tower floating with no foundation — representing corrupt Jerusalem's fallen traditions at Lehi's time.\n- **Scripture is experiential, not merely narrative.** The text is designed so the reader *becomes* Lehi, lives the vision vicariously — a Hebraic method meant to invoke an interior experience rather than just transmit information.\n- **Kabbalah simply means \"to receive.\"** It refers to the ancient prophetic science of receiving revelation from God — not occultism. The Book of Mormon draws from this same source.\n- **Moroni 10's gifts of the Spirit map onto the Sefirot.** Read bottom-up, the 10 gifts trace the 10 sefirot — a conscious encoding, not coincidence.\n- **Enoch (Hanokh) = \"the initiate.\"** The command to become as a little child links back to Enoch being called \"the lad/youth\" in 3 Enoch — an angelic title for a human ascending into heaven. Joseph Smith's match to this detail (unknown in his era) is presented as evidence of the Book of Mormon's authenticity.\n- **Book of Mormon names are all Hebrew constructs.** Rob claims every name, including Jaredite names, are Hebrew word-constructs — not Jaredite originals.\n\n## Entities mentioned\n\n[[rob-kay]], [[the-stick-of-joseph]]\n\n## Concepts discussed\n\n[[kabbalistic-tree-of-life]], [[pardes]], [[lehis-dream]], [[kabbalah]], [[merkaba-mysticism]], [[72-names-of-god]], [[pardes]]\n\n## Contradictions / tensions with existing wiki\n\nNone yet — first source ingested on this topic.\n\n## Quotes worth keeping\n\n> \"The Book of Mormon is drawing from the same source — the same ancient source. And now we're getting an even purer, more original rendition of how these principles are meant to be received.\"\n\n> \"The weirder the phrase is — this is a clue into the Book of Mormon. The weirder the thing the story sounds, the greater the mystery, the deeper the teaching.\"\n\n> \"Everything in the Book of Mormon is a living expression and experience of what the ancient temple was meant to bring to you.\"\n\n> \"This is a person that's educated by his father in the prophetic science and traditions of ancient Israel.\"", "links": ["72-names-of-god", "kabbalah", "kabbalistic-tree-of-life", "lehis-dream", "merkaba-mysticism", "pardes", "rob-kay", "the-stick-of-joseph"]}, {"slug": "jordan-b-peterson", "folder": "entities", "type": "entity", "category": "person", "title": "Jordan B. Peterson", "author": "", "channel": "", "date": "", "url": "", "tags": ["psychology", "mythology", "meaning", "archetypes", "christianity", "philosophy", "youtube"], "updated": "2026-06-27", "body": "# Jordan B. Peterson\n\nClinical psychologist, professor (Harvard; University of Toronto), author, and public intellectual. Known for psychological analysis of myth, religion, and meaning-making. Author of *Maps of Meaning* and *12 Rules for Life*. Runs Peterson Academy as an alternative higher education platform.\n\n## Overview\n\nPeterson bridges academic psychology, mythology (especially Jungian), and biblical scholarship. His core project: explaining why the stories that humans have told across millennia are not merely entertaining but functionally necessary — they describe the hierarchies of value through which we navigate reality. His \"We Who Wrestle With God\" tour (2024) addresses the religious dimension of this directly: the claim that even secular moderns are inescapably in relationship with God.\n\n## Key facts\n\n- Academic background: Clinical psychology, personality psychology; PhD research at McGill\n- Former positions: Harvard professor; University of Toronto professor of psychology\n- Major books: *Maps of Meaning* (1999), *12 Rules for Life* (2018), *Beyond Order* (2021)\n- Platform: YouTube channel (largest intellectual podcast), Peterson Academy, DailyWire+\n- Health: As of 2026, reduced public activity due to ongoing health issues; releasing archived tour lectures weekly\n- \"We Who Wrestle With God\" tour: 50-city tour, February 2024, exploring biblical mythology\n\n## Key ideas (from wiki sources)\n\n- Stories = hierarchies of value; mythology = the deepest distillation of the most compelling stories\n- Science and prayer are structurally analogous\n- Even atheists wrestle with God (they demonstrate relationship through moral outrage)\n- The world is founded on sacrifice (work = sacrifice; what you devote effort to is the real question)\n- Intelligence breeds pride as its greatest temptation; privilege demands proportionate contribution\n- Postmodernism got the insight right (we see through stories) but reduced it to power, which is wrong\n\n## Connections\n\n- Concepts: [[stories-as-hierarchies-of-value]], [[divine-family]], [[faith-and-doubt]]\n- Appears in: [[the-problem-that-wont-let-you-go-peterson]]\n\n## Notes / open questions\n\n- His framework for \"what the biblical corpus investigates\" (on what principle is the world founded?) is a direct parallel to what [[margaret-barker]] reconstructs historically. Peterson comes at it from archetypal psychology; Barker from temple archaeology. Both arrive at the same pre-Platonic, relational, personal God.\n- Worth tracking his subsequent \"We Who Wrestle With God\" lectures (released weekly from archive)", "links": ["divine-family", "faith-and-doubt", "margaret-barker", "stories-as-hierarchies-of-value", "the-problem-that-wont-let-you-go-peterson"]}, {"slug": "joseph-smith-bushman", "folder": "entities", "type": "entity", "category": "product", "title": "Joseph Smith: Rough Stone Rolling", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "biography", "LDS", "history"], "updated": "2026-06-27", "body": "# Joseph Smith: Rough Stone Rolling\n\nRichard Lyman Bushman's landmark scholarly biography of Joseph Smith, founder of the Latter-day Saint movement.\n\n## Overview\nThe definitive academic biography of Joseph Smith, written by Mormon historian Richard Lyman Bushman. Bushman approaches Smith sympathetically but rigorously, situating him within early 19th-century American religious culture while taking seriously both his prophetic claims and his human complexity.\n\n## Key facts\n- Author: Richard Lyman Bushman\n- Genre: Biography / American Religious History\n- Published: 2005\n- Length (audiobook): ~28 hours (partial remaining)\n\n## Connections\n- Related to: [[richard-lyman-bushman]]\n- Subject: [[joseph-smith]] (stub — deserves its own entity page as a person)\n- See also: [[divine-family]], [[kabbalah]], [[rob-kay]]\n\n## Notes / open questions\n- Full title is *Joseph Smith: Rough Stone Rolling*; Audible lists it as \"Joseph Smith\"\n- Considered the gold standard biography in LDS scholarly circles", "links": ["divine-family", "joseph-smith", "kabbalah", "richard-lyman-bushman", "rob-kay"]}, {"slug": "kabbalah", "folder": "concepts", "type": "concept", "category": "", "title": "Kabbalah", "author": "", "channel": "", "date": "", "url": "", "tags": ["hebrew", "mysticism", "kabbalah", "ancient-israel", "prophetic-tradition"], "updated": "2026-06-26", "body": "# Kabbalah\n\nThe ancient Israelite tradition of \"receiving\" divine knowledge — a body of prophetic science and practice whose origins trace to pre-Mosaic (Adamic/Enochian) revelation, transmitted through the Hebrew patriarchs, and preserved in various forms through Jewish tradition. Not the pop-culture appropriation (red strings, celebrity spirituality) but the original framework of the Hebrew prophetic schools.\n\n## Explanation\n\nThe word *Kabbalah* (also Cabala, Qabalah) derives from the Hebrew root *קבל* (kabal) — **to receive**. In its authentic ancient sense it means:\n\n> Receiving divine wisdom from God's mouth to the ears of the initiate.\n\nIt is not occultism. It is the ancient prophetic science: a body of knowledge given to Adam, passed through Enoch, Abraham, Moses, and the Hebrew prophets — designed to facilitate a person's *yichud* (unification) with God. The goal is not intellectual enlightenment but the literal transformation of the initiate: acquiring the gifts of the Spirit, ascending toward divine union, and ultimately helping establish heaven on earth (Tikkun Olam — rectification/restoration of all things).\n\n### Historical layers\n\n- **Ancient source (pre-Mosaic):** Knowledge given to Adam from angelic beings; passed through Enoch (Hanokh, \"the initiate\"), Abraham, Moses. The prophetic schools of ancient Israel were the primary transmission vehicle.\n- **Preservation in Judaism:** After the destruction of the Temple and exile, fragmented knowledge was preserved in various Jewish Kabbalistic traditions — the Sefirot framework (see [[kabbalistic-tree-of-life]]), Heikhalot mysticism, etc.\n- **Modern \"Kabbalah\":** Later systematizations (900 AD onward) that codified the Sefirot diagram, plus modern appropriations that distort the original. Rob Kay distinguishes this sharply from the ancient source.\n\n### Relationship to the Book of Mormon\n\nRob Kay's core argument: the Book of Mormon draws from the same ancient prophetic source as authentic Kabbalah — not from Jewish Kabbalah itself, but from the common upstream tradition both share. Nephi's family carried this knowledge out of Jerusalem *before* many of these teachings were lost or distorted. The Book of Mormon therefore in some ways represents a *purer* form of these ancient principles than what survived in Jewish tradition.\n\n> \"We're getting an even purer, more original rendition of how these principles are meant to be received.\"\n\n### Key practices\n\n- **Invoking divine names:** The 72 Names of God (encoded in Exodus 14:19–21; see [[72-names-of-god]]) — considered words of power that connect the practitioner to specific attributes of God.\n- **Hebraic meditation:** Not emptying the mind (transcendental) but *unification* — conscious attention and heart directed toward God/Christ creates an actual spiritual connection (\"where consciousness goes, spirit flows\").\n- **Four levels of interpretation (PaRDeS):** See [[pardes]].\n- **Initiatory ascent:** See [[kabbalistic-tree-of-life]], [[merkaba-mysticism]].\n\n## Connections\n\n- See also: [[kabbalistic-tree-of-life]], [[pardes]], [[lehis-dream]], [[merkaba-mysticism]], [[72-names-of-god]]\n- Discussed by: [[rob-kay]]\n- Evidenced in: [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Open questions / tensions\n\n- The tension between Kabbalah as an authentic ancient tradition vs. a later systematization is real — Rob acknowledges the diagram is more recent but insists the concepts are ancient. Holding both is honest.\n- How much of authentic Kabbalah survived persecution and dispersion? Rob implies it's fragmentary — the Book of Mormon fills gaps.\n- The Kemetic (Egyptian) Tree of Life predating the Jewish Kabbalistic one opens a question about the ultimate origin of these frameworks.", "links": ["72-names-of-god", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalistic-tree-of-life", "lehis-dream", "merkaba-mysticism", "pardes", "rob-kay"]}, {"slug": "kabbalistic-tree-of-life", "folder": "concepts", "type": "concept", "category": "", "title": "Kabbalistic Tree of Life (Sefirot)", "author": "", "channel": "", "date": "", "url": "", "tags": ["kabbalah", "hebrew", "mysticism", "sefirot", "tree-of-life", "book-of-mormon"], "updated": "2026-06-26", "body": "# Kabbalistic Tree of Life (Sefirot)\n\nA diagram and conceptual framework from ancient Israelite/Jewish tradition depicting the 10 emanations (sefirot) of God arranged in three pillars, connected by 22 paths — together forming 32 \"paths of wisdom\" — representing both the attributes of God and the initiatory path by which a person ascends toward divine union.\n\n## Explanation\n\nThe Tree of Life (Etz Chaim) in Kabbalistic tradition is not primarily a botanical image but a map — simultaneously a map of God's attributes, a map of the cosmos, and a map of the soul's journey toward God. Its key elements:\n\n**The 10 Sefirot (emanations/fruits):**\n\n| Position | Name | Meaning |\n|----------|------|---------|\n| Top | Keter | Crown — highest, God's will |\n| Right upper | Chokhmah | Wisdom |\n| Left upper | Binah | Understanding |\n| (Hidden) | Da'at | Knowledge — sometimes omitted |\n| Right middle | Chesed | Mercy/loving-kindness |\n| Left middle | Gevurah | Judgment/strength |\n| Center | Tiferet | Beauty — perfect balance, center of tree; associated with Christ (\"Zer Anpin\") |\n| Right lower | Netzach | Endurance/longsuffering |\n| Left lower | Hod | Glory |\n| Center lower | Yesod | Foundation — connecting point between upper and lower worlds |\n| Bottom | Malkhut | Kingdom — this earth, where we start |\n\n**The three pillars:**\n- Pillar of Mercy (right): Chokhmah, Chesed, Netzach\n- Pillar of Severity (left): Binah, Gevurah, Hod\n- Middle Way/direct path (center): Keter–Tiferet–Yesod–Malkhut\n\n**The paths:** 22 connecting paths between sefirot + 10 sefirot = 32 \"paths of wisdom\" — the phrase *wisdom's paths* appears verbatim in Mosiah 2:36 and Helaman 12:5 in the Book of Mormon.\n\n**The lightning strike:** The pattern of divine emanation descending down the tree (and the initiatory path ascending) is called the lightning strike — related to the flaming sword at the Garden of Eden and, in Altaic shamanism, the belief that shamans ride lightning bolts to the upper world.\n\n## Relationship to Lehi's Dream\n\nAccording to [[rob-kay]], Lehi's Vision maps precisely onto the Sefirot:\n- The dark and dreary wilderness = *tohu va'vohu* (chaos, \"without form and void\"), the entry into initiation\n- The tree = the Sefirot itself\n- The fruit = the sefirot as fruits; each represents an aspect of God's love\n- The river = the river that ran through Eden, dividing four ways\n- The iron rod = the Gevurah branch (judgment/strength); also Moses's rod\n- The great and spacious building = the \"flying lamed\" — a tower with no foundation, symbol of corrupt Jerusalem\n- Forbidden paths = the Sitra Achra (dark tree), the inverse/shadow tree below\n\n## The dark tree (Sitra Achra)\n\nA mirror-image inverse of the Sefirot — same structure, attributes inverted toward evil. Referenced in the Book of Mormon as the \"forbidden paths.\" The adversary uses the same divine laws (\"he bound Cain in the name of Yahweh\") because he has near-perfect knowledge of heaven's laws. Like Sith vs. Jedi — same power source, opposite orientation.\n\n## Connections\n\n- See also: [[lehis-dream]], [[kabbalah]], [[pardes]], [[72-names-of-god]], [[merkaba-mysticism]]\n- Used by: [[rob-kay]]\n- Evidenced in: [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Open questions / tensions\n\n- The Sefirot diagram in its current form dates somewhere from 900 AD to Moses-era; origin is debated. Rob acknowledges the *concepts* are ancient but the *diagram* is more recent — this is worth holding loosely.\n- The Kemetic (Egyptian) Tree of Life predates the Kabbalistic one — relationship between the two traditions is worth exploring.\n- Rob's claim that Moroni 10's 10 gifts of the Spirit map onto the 10 sefirot (read bottom-up) needs its own investigation.", "links": ["72-names-of-god", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "lehis-dream", "merkaba-mysticism", "pardes", "rob-kay"]}, {"slug": "lehis-dream", "folder": "concepts", "type": "concept", "category": "", "title": "Lehi's Dream (Vision of the Tree of Life)", "author": "", "channel": "", "date": "", "url": "", "tags": ["book-of-mormon", "lehi", "vision", "tree-of-life", "hebrew", "kabbalah"], "updated": "2026-06-26", "body": "# Lehi's Dream (Vision of the Tree of Life)\n\nThe foundational vision in the Book of Mormon (1 Nephi 8, expanded in 1 Nephi 11–15) in which the prophet Lehi is led through a dark wilderness by an angelic being and arrives at a tree whose fruit represents the love of God. A second version is given through Nephi's own vision. Rob Kay argues this is a deeply encoded initiatory map drawn from ancient Israelite/Kabbalistic tradition.\n\n## Explanation\n\n### The standard reading (Peshat)\n\nLehi sees: a dark wilderness → a tree with white fruit → an iron rod along a river → a great and spacious building full of mockers → forbidden paths where people are lost in mists of darkness. The fruit of the tree = the love of God; holding to the iron rod (word of God) leads to the tree.\n\n### The Kabbalistic reading (Sod)\n\nAccording to [[rob-kay]], every element maps onto the [[kabbalistic-tree-of-life]] (Sefirot) and onto the Heikhalot/Hekhalot ascent literature (palace/chariot mysticism):\n\n| Dream Element | Kabbalistic Correspondence |\n|---------------|---------------------------|\n| Dark and dreary wilderness | *Tohu va'vohu* — chaos/void; entry into initiation; Klipot (shells, fallen world) |\n| The angelic guide into chaos | The \"angel of the Klipot\" — whose *job* is to escort the initiate into chaos, not to deceive |\n| Calling on God's name | Invoking the divine name (Yahweh) — in ancient Israel an act of prophetic power |\n| The tree | The Sefirot itself |\n| The fruit | The sefirot as fruits — each an expression of God's love |\n| The river (running by the tree) | The river of Eden that departed four ways = four dimensions of the tree |\n| The iron rod | The Gevurah branch (judgment/strength); Moses's rod (Mateh Elohim); branch of the tree reaching out to the initiate |\n| The great and spacious building | The \"flying lamed\" — a tower with no foundation, symbol of corrupt Jerusalem's religious/political establishment |\n| Forbidden paths | The Sitra Achra — the dark/shadow tree, inverse of the Sefirot |\n| Mists of darkness | Pollution of the \"waters\" (divine revelation) by Jerusalem's corrupt practices |\n\n### Why two versions?\n\nThere are two accounts (Lehi's in 1 Nephi 8, Nephi's in 1 Nephi 11–15) because:\n1. One is the experience itself; one is the *instruction manual* (Nephi's questions and the angel's explanations).\n2. In Hebraic tradition, such experiences occur at both a literal/historical and a symbolic/initiatory level simultaneously.\n\n### First Nephi as Exodus narrative\n\nThe entire structure of First Nephi follows the Exodus pattern: departure from a corrupt Egypt-equivalent (Jerusalem), wilderness journey, chaos and testing, arrival at the promised land. The Tree of Life vision is the first great symbolic revelation on that journey.\n\n## The experiential posture\n\nThe dream is written so the reader becomes Lehi — vicariously living the initiation, not just observing it. This is the Sod level of [[pardes]] applied: the text creates visualization and invokes emotion to transmit the experience across time.\n\n## Connections\n\n- See also: [[kabbalistic-tree-of-life]], [[kabbalah]], [[pardes]], [[72-names-of-god]]\n- Discussed by: [[rob-kay]]\n- Appears in: [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Open questions / tensions\n\n- Nephi's expansion of Lehi's dream (asking the angel to explain each element) is itself modeled on the Derash level of interpretation — worth exploring.\n- The connection between the tree of life and the Menorah (seven-branched lampstand) is explicitly made: the Menorah *is* the tree of life. This has implications for temple symbolism throughout LDS liturgy.\n- The Book of Mormon as an \"experiential temple\" — the structure of the whole book from 1 Nephi through Moroni following the pattern of the Mishkan — is a major thesis worth its own concept page.", "links": ["72-names-of-god", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "pardes", "rob-kay"]}, {"slug": "llm-wiki-karpathy", "folder": "sources", "type": "source", "category": "", "title": "LLM Wiki", "author": "Andrei Karpathy", "channel": "", "date": "2026-04-04", "url": "https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f", "tags": ["llm", "knowledge-management", "obsidian", "wiki", "rag"], "updated": "2026-06-26", "body": "# LLM Wiki\n\n## Summary\n\nKarpathy's essay describes a pattern for building personal knowledge bases using LLMs — not as retrieval systems (RAG), but as active maintainers of a persistent, compounding wiki. Instead of rediscovering knowledge at query time, the LLM reads sources and integrates them into structured markdown pages (entities, concepts, summaries), updating cross-references and noting contradictions as it goes. The human sources and explores; the LLM does the bookkeeping. The schema document (CLAUDE.md / AGENTS.md) is the key configuration that makes this work.\n\n## Key takeaways\n\n- **Wiki vs. RAG.** RAG rediscovers knowledge on every query. A persistent wiki compiles it once and keeps it current — cross-references are already built, contradictions already flagged.\n- **Three layers:** raw sources (immutable), the wiki (LLM-owned), and the schema (the instruction document that disciplines the LLM).\n- **Three operations:** Ingest (process a new source, touch ~10–15 wiki pages), Query (read index → relevant pages → synthesize; file good answers back as wiki pages), Lint (health check for orphans, stale claims, missing cross-refs).\n- **index.md is content-oriented** (catalog of all pages); **log.md is chronological** (append-only activity record). Both are essential navigation aids as the wiki grows.\n- **Good answers should be filed back.** Discoveries made during queries compound into the wiki rather than disappearing into chat history.\n- **Obsidian is the natural IDE.** Graph view reveals structure; Dataview queries frontmatter; Marp produces slide decks from wiki content.\n- **The bottleneck LLMs solve is maintenance**, not reading. Humans abandon wikis because the bookkeeping burden grows. LLMs don't get bored.\n- Inspired by **Vannevar Bush's Memex** (1945) — private, associative, curated — but the LLM solves the \"who does the maintenance\" problem Bush couldn't.\n\n## Entities mentioned\n\n[[andrei-karpathy]]\n\n## Concepts discussed\n\n[[llm-wiki-pattern]]\n\n## Contradictions / tensions with existing wiki\n\nNone — this is the foundational source for the wiki architecture itself.\n\n## Quotes worth keeping\n\n> \"The wiki is a persistent, compounding artifact. The cross-references are already there. The contradictions have already been flagged. The synthesis already reflects everything you've read.\"\n\n> \"You never (or rarely) write the wiki yourself — the LLM writes and maintains all of it. You're in charge of sourcing, exploration, and asking the right questions.\"\n\n> \"The tedious part of maintaining a knowledge base is not the reading or the thinking — it's the bookkeeping... LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass.\"", "links": ["andrei-karpathy", "llm-wiki-pattern"]}, {"slug": "llm-wiki-pattern", "folder": "concepts", "type": "concept", "category": "", "title": "LLM Wiki Pattern", "author": "", "channel": "", "date": "", "url": "", "tags": ["llm", "knowledge-management", "obsidian", "rag", "wiki", "second-br
