vel exploring themes connected to the Book of Mormon as a keystone of faith.\n\n## Overview\nA fiction work by Jonah R. Barnes. The title references the \"keystone\" concept — Joseph Smith's description of the Book of Mormon as the keystone of the LDS religion.\n\n## Key facts\n- Author: Jonah R. Barnes\n- Genre: LDS Fiction\n- Length (audiobook): ~6.5 hours (partial remaining)\n\n## Connections\n- Related to: [[jonah-r-barnes]]\n\n## Notes / open questions\n- Limited information available; need to ingest or read to add substantive notes", "links": ["jonah-r-barnes"]}, {"slug": "the-laws-of-human-nature", "folder": "entities", "type": "entity", "category": "product", "title": "The Laws of Human Nature", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "psychology", "self-development", "power"], "updated": "2026-06-27", "body": "# The Laws of Human Nature\n\nRobert Greene's comprehensive guide to understanding and mastering human behavior, motivation, and social dynamics.\n\n## Overview\nGreene distills insights from history, philosophy, and psychology into 18 laws governing human nature — covering topics like irrationality, narcissism, envy, shortsightedness, and the need for belonging. Positioned as the definitive companion to his earlier *48 Laws of Power*.\n\n## Key facts\n- Author: Robert Greene\n- Genre: Psychology / Self-Development\n- Published: 2018\n- Length (audiobook): ~28.5 hours\n\n## Connections\n- Related to: [[robert-greene]]\n- See also: [[mental-performance]] (related theme of self-mastery)\n\n## Notes / open questions\n- #1 New York Times bestseller", "links": ["mental-performance", "robert-greene"]}, {"slug": "the-problem-that-wont-let-you-go-peterson", "folder": "sources", "type": "source", "category": "", "title": "The Problem That Won't Let You Go", "author": "Jordan B. Peterson", "channel": "Jordan B Peterson", "date": "2026-06-21", "url": "https://www.youtube.com/watch?v=FFxFoHeOQx4", "tags": ["mythology", "psychology", "meaning", "stories", "sacrifice", "god", "faith", "science", "consciousness"], "updated": "2026-06-27", "body": "# The Problem That Won't Let You Go\n\n## Summary\n\nJordan Peterson's opening lecture of his \"We Who Wrestle With God\" 50-city tour (delivered February 4, 2024 in Providence, RI). Peterson argues that we are inescapably in a relationship with God — even atheists wrestle with God through moral outrage — and that the deepest human enterprise (science, meaning-making, storytelling) is structurally identical to prayer. The lecture builds a theory of why stories are not merely entertainment but the necessary framework through which human beings navigate reality, and asks the foundational question the biblical corpus investigates: on what principle is the world founded?\n\n## Key takeaways\n\n- **Even atheists wrestle with God.** Stephen Fry and Ivan Karamazov both make their argument *against* God through moral outrage — shaking their fists at the sky. You don't shake your fist at rocks. This reveals they are in relationship with what they deny. \"Present or absent, we wrestle with God.\"\n- **Stories are hierarchies of value.** We cannot perceive without a hierarchy of values — even visual perception requires prioritizing some things over others. A story is a description of that hierarchy. This is why we go to movies, even scary ones: to practice navigating evaluative landscapes we haven't encountered yet.\n- **Mythology is the distillation of the deepest stories.** Deep stories (Shakespeare, Dostoevsky, the Bible) are more real than shallow ones because they represent truths that surpass the merely literal. Mythology is what results when the most compelling stories are aggregated across millennia.\n- **Science and prayer are structurally identical.** A real scientific problem is one that won't let you go — it grips you by something beyond your control. The process: (1) a problem you can't escape, (2) an admission of insufficiency (\"you don't know the answer\"), (3) a reaching into the beyond for revelation, (4) critical testing of what comes back. This is exactly prayer. Peterson: \"I don't see any difference between that on the scientific front and prayer.\"\n- **The problem that grips you is a calling.** What you cannot escape investigating may be exactly what you are suited to solve. \"The deeper the problem, the more it's going to hurt you. But the more opportunity lurks in that problem.\"\n- **Intelligence and pride.** From those to whom much is given, much is expected. The great temptation for intelligent people is pride — and the downside of brilliant-pride is proportionately worse than the downside of ordinary pride.\n- **Postmodernists got the insight right but the answer wrong.** They were correct that we see the world through stories (hierarchies of value), not raw facts. But they reduced the root story to power — and this is wrong, because psychopaths (who use only power) comprise only 3% of the population and do poorly. If power were the fundamental organizing principle, psychopaths would dominate.\n- **The world is founded on sacrifice, not power.** What is the biblical corpus investigating? Peterson's answer: \"Toward what should sacrifice be devoted?\" Work = sacrifice. To what end will you devote your effort? This is the deepest question.\n- **Human beings as microcosm.** Dawkins: every organism is a microcosmic model of its environment. Medieval Christians said the human soul is a microcosm of the cosmic order. Same claim. Implication: we are not alienated consciousnesses in a dead material world — we are in relationship with the structure of being itself.\n\n## Entities mentioned\n\n[[jordan-b-peterson]]\n\n## Concepts discussed\n\n[[stories-as-hierarchies-of-value]], [[divine-family]]\n\n## Contradictions / tensions with existing wiki\n\n- Peterson and [[dave-butler]] converge from very different angles: both argue that the abstract, philosophically-correct God (Platonic/Aristotelian) is inadequate for human life. Peterson says it from psychology (you can't be in relationship with an abstraction); Butler says it from historical theology (Israelites never believed in that God to begin with).\n- Peterson's \"science as prayer\" framework is a secular bridge to [[faith-and-doubt]]: both Holland and Peterson end up at the same place — genuine insufficiency acknowledged and a sincere reaching for what lies beyond.\n- The Dostoevsky framing (Ivan vs. Alyosha) maps onto Manning's [[task-vs-ego-orientation]]: Ivan wins all the arguments (ego-level) but Alyosha is the better man (task/virtue level). Winning the argument doesn't mean you're right.\n\n## Quotes worth keeping\n\n> \"Present or absent, we wrestle with God. That's human destiny.\"\n\n> \"It has to be a real problem. It has to be something — and how do you know if it's a real problem? It won't let you go.\"\n\n> \"Where do your hypotheses come from? What grips your interest? What compels you and calls you forward? Zero instruction in that in the scientific realm.\"\n\n> \"You're not going to get much of an answer unless you ask the question. And that's really what prayer is in the final analysis — an admission of insufficiency and a reaching into the beyond for a revelation.\"\n\n> \"The dragon hoards the gold. And implicit in that is the notion that the larger dragons have the more valuable gold.\"\n\n> \"What are you going to do? You're going to work with no purpose? You're going to sacrifice with no purpose? You're going to suffer with no purpose?\"", "links": ["dave-butler", "divine-family", "faith-and-doubt", "jordan-b-peterson", "stories-as-hierarchies-of-value", "task-vs-ego-orientation"]}, {"slug": "the-stick-of-joseph", "folder": "entities", "type": "entity", "category": "org", "title": "The Stick of Joseph", "author": "", "channel": "", "date": "", "url": "", "tags": ["youtube", "lds", "book-of-mormon", "channel"], "updated": "2026-06-26", "body": "# The Stick of Joseph\n\nA Latter-day Saint YouTube channel dedicated to making the Book of Mormon accessible through engaging, entertaining, and informative content.\n\n## Overview\n\nThe Stick of Joseph produces video content exploring the Book of Mormon from scholarly, historical, and spiritual angles. Its name references the prophecy in Ezekiel 37 of the \"stick of Joseph\" (representing the Book of Mormon) joining with the \"stick of Judah\" (the Bible). The channel regularly features guests with backgrounds in ancient Near Eastern studies, Hebrew, and related fields.\n\nThe channel is connected to **Plain & Precious Publishing**, which publishes LDS-oriented scholarly works (e.g. *Key to the Keystone*, *In the Language of Adam*, *The Lost Gems of Genesis*, *Hidden Holy Days*).\n\n## Key facts\n\n- Platform: YouTube\n- Focus: Book of Mormon scholarship, ancient Israelite context, spiritual depth\n- Associated publisher: Plain & Precious Publishing\n- Hosts include: Hayden (primary host in the Rob Kay episode), Dave Butler (co-host, author)\n- Runs a companion event series: \"Stick of Judah\" Old Testament lecture series\n\n## Connections\n\n- Features: [[rob-kay]], [[dave-butler]], [[mike-day]]\n- Concept focus: [[lehis-dream]], [[kabbalistic-tree-of-life]], [[kabbalah]], [[pardes]], [[serpent-symbolism]], [[divine-family]]\n- Appears in: [[jewish-convert-decodes-lehis-dream-rob-kay]], [[ancient-meaning-of-serpent-stick-of-joseph]], [[family-of-heaven-dave-butler]]\n\n## Notes / open questions\n\n- Dave Butler is essentially a co-host (see [[dave-butler]]) — appears in multiple episodes, owns the recurring slot.\n- Mike Day (@talkingscripture) is a recurring scholarly guest on ancient Israelite religion.\n- Dr. Christopher Blythe (BYU folklore) and Cameron Coleman are also mentioned as past/future guests.", "links": ["ancient-meaning-of-serpent-stick-of-joseph", "dave-butler", "divine-family", "family-of-heaven-dave-butler", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "lehis-dream", "mike-day", "pardes", "rob-kay", "serpent-symbolism"]}, {"slug": "family-of-heaven-dave-butler", "folder": "sources", "type": "source", "category": "", "title": "What Ancient Scripture Reveals About the Family of Heaven | Dave Butler", "author": "Dave Butler", "channel": "The Stick of Joseph", "date": "2025-11-09", "url": "https://www.youtube.com/watch?v=5E4uSkrqe9w", "tags": ["divine-family", "heavenly-mother", "ancient-israel", "ugarit", "platonism", "lds-theology", "old-testament"], "updated": "2026-06-26", "body": "# What Ancient Scripture Reveals About the Family of Heaven | Dave Butler\n\n## Summary\n\nDave Butler (with Austin Falter) argues that the LDS doctrine of God as a divine family — Father, Mother, Son — is not a Joseph Smith invention but a restoration of a very old idea that predates the Bible. Ancient Israelite belief (as evidenced in Ugaritic tablets and the Old Testament itself, especially Genesis 49) understood God not as a Platonic abstraction but as a family of beings. The Platonic/Aristotelian conception of God as \"the Good\" or \"the unmoved mover\" is a Greek philosophical import that distorted original Israelite theology into the abstract monotheism of modern Christianity.\n\n## Key takeaways\n\n- **God as divine family is pre-biblical.** The idea of God as a family of beings — Father, Mother, Son — is attested in ancient Israelite belief through Ugaritic texts and traces in the Old Testament (explicitly in Genesis 49, per Dave Butler). This predates Joseph Smith's restoration by millennia.\n- **Abstract monotheism is Greek, not Israelite.** The Platonic God (God as the Form of Goodness) and Aristotelian God (the unmoved mover) were adopted by early Christian and Jewish intellectuals (notably Philo of Alexandria) who wanted to make their religion respectable to Greco-Roman intellectuals. This Greek theology became orthodox Christianity's God — but it's an import, not the original Israelite theology.\n- **Most Christians pray to a personal God anyway.** Despite creedal abstract theology, practicing Christians almost universally relate to God as a person/father in prayer — suggesting the ancient personal, familial concept of God persists in human religious instinct even when official doctrine says otherwise.\n- **Israel was not always monotheistic.** Multiple scholars (referenced: Mark S. Smith, *The Early History of God*) show that first-temple Israelite religion included acknowledgment of Yahweh's divine consort (Asherah) and a divine council. The strict monotheism enforced later (by Hezekiah, Josiah) was a reform, not the original state.\n- **Family-centered = Christ-centered.** The LDS emphasis on divine family is not in tension with being Christ-centered — the divine family *is* the structure within which Christ operates. Christ as Son, God as Father, with a divine Mother, is the original family-of-heaven framework.\n- **Referenced book:** Mark S. Smith, *The Early History of God: Yahweh and the Other Deities in Ancient Israel.*\n\n## Entities mentioned\n\n[[the-stick-of-joseph]], [[dave-butler]]\n\n## Concepts discussed\n\n[[divine-family]], [[kabbalah]]\n\n## Contradictions / tensions with existing wiki\n\nExtends [[kabbalah]] — the Kabbalistic tradition also preserves a feminine aspect of God (the Shekhinah, the divine feminine/indwelling presence). The \"divine family\" in ancient Israelite theology (Father, Mother, Son) is structurally parallel to the Kabbalistic Sefirot's upper triad (Keter, Chokmah, Binah — often read as Father, Mother, and their union). Worth developing this connection further.\n\n## Quotes worth keeping\n\n> \"God is not some sort of impersonal force and God is not singular. God is a family of beings.\"\n\n> \"Israel was not always monotheistic and people thought it was perfectly acceptable to worship Yahweh and acknowledge that he had a father and a mother.\"\n\n> \"This doesn't have its origin with Joseph Smith or the restoration of the gospel — this has a much more ancient origin.\"", "links": ["dave-butler", "divine-family", "kabbalah", "the-stick-of-joseph"]}, {"slug": "what-did-josiah-reform-barker-byu", "folder": "sources", "type": "source", "category": "", "title": "What Did Josiah Reform? The Earlier Religion of Israel", "author": "Margaret Barker", "channel": "BYU Speeches", "date": "2003-01-01", "url": "https://www.youtube.com/watch?v=_fd13_PKCHw", "tags": ["margaret-barker", "josiah", "deuteronomic-reform", "first-temple", "asherah", "melchizedek", "dead-sea-scrolls", "temple-theology"], "updated": "2026-06-27", "body": "# What Did Josiah Reform? The Earlier Religion of Israel\n\n## Summary\n\nMargaret Barker's 2003 BYU address — the foundational lecture for her Temple Theology work as it intersects with LDS scholarship. She reconstructs what Josiah's 623 BC reform actually destroyed by cross-referencing non-canonical texts (Dead Sea Scrolls, Book of Enoch, Damascus Document, Book of Jubilees) with what Deuteronomy condemns but other Old Testament texts permit. The \"reform\" was actually a theological catastrophe — an erasure of first-temple religion's richest elements.\n\n## Key takeaways\n\n- **What Josiah removed in 623 BC:** The Asherah (tree of life / Lady), the true Menorah (hidden away), the Ark, anointing oil, jar of manna, Aaron's rod, the angel priests, visions of God, Wisdom (as a divine figure), the Melchizedek tradition, the Day of Atonement's inner meaning.\n- **The Queen of Heaven had been worshipped in the temple.** Refugees fleeing to Egypt told Jeremiah that disaster came *because* of Josiah's reforms, not because of sin. Before Josiah, they had burned incense, made libations, and baked loaves for the Queen of Heaven — and prospered.\n- **The \"apostate generation\" accusation ran both ways.** The Damascus Document and Book of Enoch (written by old believers) called the second-temple people the apostate generation with impure offerings. The second-temple people had called the old believers idolaters. They were not reconciled views.\n- **Isaac may have been actually sacrificed and resurrected.** Older traditions (preserved in Jewish targums, Letter of Barnabas, Clement, Letter to the Hebrews) indicate that Isaac was not merely *nearly* sacrificed — he was actually sacrificed and resurrected. This older tradition is the structural type for Christ's actual death and resurrection. \"In the case of Jesus, no substitute was offered.\"\n- **Melchizedek was divine and messianic.** A Dead Sea Scroll fragment describes Melchizedek as divine, the Messiah, expected to return at the time of Jesus's ministry, and making the final great atonement. This entire tradition survives in the biblical texts only as one line in Psalm 110. The LDS Melchizedek Priesthood restoration corresponds to recovering this suppressed tradition.\n- **The Six Days of creation = Six Days of building the Tabernacle.** Day One corresponds to the Holy of Holies. What happened on Day One (secret of the Holy of Holies): the creation of the angel spirits (from the Book of Jubilees and the Greek Daniel). Genesis says only \"let there be light\" — the angels were a secret of the Holy of Holies, excluded from public scripture by Josiah's reforms.\n- **Deuteronomy's God vs. the older God.** Deuteronomy forbids: seeing God (Deut 4: \"you saw no form, only a voice\"), the host of heaven/angels, Wisdom as a divine figure, the Asherah, hilltop shrines. But Exodus says Moses and the elders *saw* the God of Israel (Exod 24). Isaiah *saw* the Lord (Isa 6). Deuteronomy's God is the impoverished version.\n- **What would be restored in the messianic age.** Jewish commentaries: when the Messiah comes, five things will be restored from the first temple that the second lacked — the fire, the ark, the menorah, the spirit, and the cherubim. The Messiah's temple = the first temple, not Josiah's version.\n- **The houses of the \"prostitutes\"** in the temple (2 Kings 23) — the Hebrew letters can equally be read as \"holy ones\" or \"angels.\" Josiah didn't destroy brothels in the temple; he destroyed the shrines of the angel priests.\n\n## Entities mentioned\n\n[[margaret-barker]]\n\n## Concepts discussed\n\n[[deuteronomic-reform]], [[asherah]], [[temple-theology]], [[school-of-isaiah]], [[serpent-symbolism]], [[divine-family]]\n\n## Contradictions / tensions with existing wiki\n\nThis is the scholarly foundation beneath all the other Barker content. The Josiah Reform explains:\n- Why [[serpent-symbolism]] (Nehushtan) was destroyed (Hezekiah, precursor to Josiah)\n- Why the divine family ([[divine-family]], [[asherah]]) was suppressed from the biblical record\n- Why the Book of Mormon (brass plates, pre-Josiah) preserves things the post-Josiah Bible doesn't\n- Why [[mike-day]] says Numbers 21 is an E-text: the northern (Ephraim/Manasseh) tradition preserved what the southern Deuteronomists erased\n\n## Quotes worth keeping\n\n> \"By surveying the texts which still survive, we can begin to piece together what it was that Josiah destroyed. Most of those texts imply that Josiah's work was a disaster.\"\n\n> \"The refugees who fled to Egypt said it had fallen because of King Josiah... Until very recently, they said, they had worshipped differently and had prospered. But when they changed the manner of worship, disaster had followed.\"\n\n> \"The people who preserved the Enoch texts looked forward to the Lord destroying this impure temple and building a new and greater temple in its place.\"\n\n> \"Those who built the second temple were an apostate generation and their deeds were evil.\" — Book of Enoch\n\n> \"In the sixth week, all those who lived in the temple forsook wisdom and lost their vision, and then the temple was burned.\" — Book of Enoch, Apocalypse of Weeks", "links": ["asherah", "deuteronomic-reform", "divine-family", "margaret-barker", "mike-day", "school-of-isaiah", "serpent-symbolism", "temple-theology"]}];

<script>
(function(){
  const bySlug={}; DATA.forEach(p=>bySlug[p.slug]=p);
  const backlinks={}; DATA.forEach(p=>p.links.forEach(l=>{(backlinks[l]=backlinks[l]||[]).push(p.slug)}));
  const LS_KEY='sb_questions_v1';
  function loadQs(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch(e){return[]}}
  function saveQs(a){try{localStorage.setItem(LS_KEY,JSON.stringify(a))}catch(e){}}

  function folderType(p){return p.folder==='sources'?'source':p.folder==='entities'?'entity':p.folder==='concepts'?'concept':'page';}
  function badge(p){const t=folderType(p);return `<span class="badge ${t}">${t}</span>`;}
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // ----- detect web connector (dormant slot) -----
  const HAS_WEB = (typeof window.cowork!=='undefined' && Array.isArray(window.__WEB_TOOLS__) && window.__WEB_TOOLS__.length>0);

  let state={mode:'search',q:'',tab:'all',tag:null,connected:null};

  // ----- search core -----
  function tokenize(s){return s.toLowerCase().split(/[^a-z0-9]+/).filter(x=>x.length>1);}
  function score(p,tokens){if(!tokens.length)return 0;const title=p.title.toLowerCase(),body=p.body.toLowerCase(),slug=p.slug.toLowerCase(),tags=p.tags.join(' ').toLowerCase();let s=0,all=true;tokens.forEach(tk=>{let h=false;if(title.includes(tk)){s+=40;h=true;if(title.startsWith(tk))s+=15;}if(slug.includes(tk)){s+=12;h=true;}if(tags.includes(tk)){s+=18;h=true;}const bc=body.split(tk).length-1;if(bc>0){s+=Math.min(bc*3,24);h=true;}if(!h)all=false;});if(!all)s*=0.25;return s;}
  function ranked(tokens,pool){return pool.map(p=>({p,s:score(p,tokens)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.p);}
  function snippet(p,tokens){const body=p.body.replace(/\[\[([^\]]+)\]\]/g,'$1').replace(/[#>*`_]/g,'').replace(/\s+/g,' ').trim();if(!tokens.length)return body.slice(0,170);const low=body.toLowerCase();let idx=-1;for(const tk of tokens){const i=low.indexOf(tk);if(i>=0&&(idx<0||i<idx))idx=i;}if(idx<0)return body.slice(0,170);const st=Math.max(0,idx-55);let s=(st>0?'… ':'')+body.slice(st,st+190);tokens.forEach(tk=>{s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');});return s;}

  // ----- markdown -----
  function mdToHtml(md){md=md.replace(/^#\s+.*$/m,'');const L=md.split('\n');let h='',i=0,ul=false,ol=false,q=false;
    const cl=()=>{if(ul){h+='</ul>';ul=false;}if(ol){h+='</ol>';ol=false;}};const cq=()=>{if(q){h+='</blockquote>';q=false;}};
    while(i<L.length){let ln=L[i];
      if(/^\s*\|/.test(ln)&&i+1<L.length&&/^\s*\|[\s:|-]+\|?\s*$/.test(L[i+1])){cl();cq();const hd=ln.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());i+=2;let rs=[];while(i<L.length&&/^\s*\|/.test(L[i])){rs.push(L[i].trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim()));i++;}h+='<table><thead><tr>'+hd.map(x=>`<th>${inline(x)}</th>`).join('')+'</tr></thead><tbody>'+rs.map(r=>'<tr>'+r.map(c=>`<td>${inline(c)}</td>`).join('')+'</tr>').join('')+'</tbody></table>';continue;}
      let m;if(/^\s*$/.test(ln)){cl();cq();i++;continue;}
      if(m=ln.match(/^(#{1,4})\s+(.*)$/)){cl();cq();const lv=Math.min(m[1].length+1,4);h+=`<h${lv}>${inline(m[2])}</h${lv}>`;i++;continue;}
      if(/^\s*([-*])\s+/.test(ln)){cq();if(!ul){cl();h+='<ul>';ul=true;}h+=`<li>${inline(ln.replace(/^\s*[-*]\s+/,''))}</li>`;i++;continue;}
      if(/^\s*\d+\.\s+/.test(ln)){cq();if(!ol){cl();h+='<ol>';ol=true;}h+=`<li>${inline(ln.replace(/^\s*\d+\.\s+/,''))}</li>`;i++;continue;}
      if(/^\s*>\s?/.test(ln)){cl();if(!q){h+='<blockquote>';q=true;}h+=inline(ln.replace(/^\s*>\s?/,''))+'<br>';i++;continue;}
      if(/^\s*---\s*$/.test(ln)){cl();cq();h+='<hr>';i++;continue;}
      cl();cq();h+=`<p>${inline(ln)}</p>`;i++;}
    cl();cq();return h;}
  function inline(s){s=esc(s);s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\[\[([^\]]+)\]\]/g,(m,p1)=>{const slug=p1.split('|')[0].trim();const lab=(p1.split('|')[1]||p1).trim();return bySlug[slug]?`<a class="wl" data-go="${slug}">${esc(lab)}</a>`:`<a class="wl dead">${esc(lab)}</a>`;});
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a class="wl" href="$2" target="_blank" rel="noopener">$1</a>');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');return s;}

  // ----- DOM refs -----
  const mc=document.getElementById('modecontrols'), bodyEl=document.getElementById('body');
  document.getElementById('count').textContent=DATA.length+' pages';
  document.querySelectorAll('.modebtn').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;document.querySelectorAll('.modebtn').forEach(x=>x.classList.toggle('active',x===b));renderMode();});

  // tags
  const tagCounts={};DATA.forEach(p=>p.tags.forEach(t=>{const k=t.toLowerCase();tagCounts[k]=(tagCounts[k]||0)+1}));
  const topTags=Object.keys(tagCounts).sort((a,b)=>tagCounts[b]-tagCounts[a]);
  const counts={all:DATA.length,source:DATA.filter(p=>p.folder==='sources').length,entity:DATA.filter(p=>p.folder==='entities').length,concept:DATA.filter(p=>p.folder==='concepts').length};

  function renderMode(){
    if(state.mode==='search'){
      mc.innerHTML=`<div class="searchbox"><span class="ic">⌕</span><input id="q" type="search" placeholder="Search your wiki…" autocomplete="off" value="${esc(state.q)}"><button class="clear" id="clear">×</button></div>
        <div class="tabs" id="tabs">${[['all','All'],['source','Sources'],['entity','Entities'],['concept','Concepts']].map(([k,l])=>`<div class="tab ${state.tab===k?'active':''}" data-tab="${k}">${l}<span class="n">${counts[k]}</span></div>`).join('')}</div>
        <div class="tagbar collapsed" id="tagbar"></div>`;
      const q=document.getElementById('q'),clr=document.getElementById('clear');
      clr.style.display=state.q?'block':'none';
      q.oninput=()=>{state.q=q.value;clr.style.display=q.value?'block':'none';renderSearch();};
      clr.onclick=()=>{state.q='';q.value='';clr.style.display='none';q.focus();renderSearch();};
      mc.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;state.connected=null;mc.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));renderSearch();});
      renderTags();renderSearch();
    }else if(state.mode==='ask'){
      mc.innerHTML=`<div class="searchbox"><textarea id="aq" placeholder="Ask anything… answers come from your wiki first, then Claude's knowledge.">${esc(state.q)}</textarea></div>
        <div class="askrow"><button class="askbtn" id="askbtn">Ask ✦</button>
        <span class="webflag"><span class="dot"></span>${HAS_WEB?'Live web: on':'Live web: off — answers from wiki + Claude'}</span></div>`;
      const aq=document.getElementById('aq');
      document.getElementById('askbtn').onclick=()=>doAsk(aq.value.trim());
      aq.onkeydown=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')doAsk(aq.value.trim());};
      bodyEl.innerHTML=`<div class="empty"><div class="big">✦</div>Ask a question about anything in your second brain.<br><span style="font-size:12.5px">Wiki-grounded answers, cited. Saved to your learning loop.</span></div>`;
    }else{ renderLog(); }
  }
  function renderTags(){const tb=document.getElementById('tagbar');if(!tb)return;
    let html=topTags.map(t=>`<div class="chip ${state.tag===t?'active':''}" data-tag="${t}">${t} <span style="opacity:.5">${tagCounts[t]}</span></div>`).join('');
    if(topTags.length>12)html+=`<div class="chip more" id="moreTags">${tb.classList.contains('collapsed')?'+ more':'show less'}</div>`;
    tb.innerHTML=html;tb.querySelectorAll('.chip[data-tag]').forEach(c=>c.onclick=()=>{state.tag=state.tag===c.dataset.tag?null:c.dataset.tag;renderSearch();});
    const mt=document.getElementById('moreTags');if(mt)mt.onclick=()=>{tb.classList.toggle('collapsed');renderTags();};}

  function renderSearch(){
    renderTags();
    const tokens=tokenize(state.q);let pool=DATA.slice();
    if(state.tab!=='all'){const f={source:'sources',entity:'entities',concept:'concepts'}[state.tab];pool=pool.filter(p=>p.folder===f);}
    if(state.tag)pool=pool.filter(p=>p.tags.map(t=>t.toLowerCase()).includes(state.tag));
    if(state.connected){const c=state.connected;pool=pool.filter(p=>p.slug===c||p.links.includes(c)||(backlinks[c]||[]).includes(p.slug));}
    let list=tokens.length?ranked(tokens,pool):pool.sort((a,b)=>a.folder==='sources'&&b.folder==='sources'?(b.date||'').localeCompare(a.date||''):a.title.localeCompare(b.title));
    let mh=`<span>${list.length} result${list.length!==1?'s':''}</span>`;
    if(state.connected){const cp=bySlug[state.connected];mh=`<span>↳ connected to <b style="color:var(--accent2)">${cp?esc(cp.title):state.connected}</b></span>`;}
    if(state.tag||state.connected||state.q||state.tab!=='all')mh+=`<span class="reset" id="reset">clear filters</span>`;
    let html=`<div class="meta-line">${mh}</div>`;
    if(!list.length)html+=`<div class="empty"><div class="big">✦</div>No pages match.</div>`;
    else html+='<div class="results">'+list.map(p=>{
      const sub=p.folder==='sources'?[p.channel||p.author,p.date].filter(Boolean).join(' · '):p.folder==='entities'?(p.category||'entity'):'concept';
      const tg=p.tags.slice(0,4).map(t=>`<span>${esc(t)}</span>`).join('');
      return `<div class="card" data-slug="${p.slug}"><div class="top">${badge(p)}<h3>${esc(p.title)}</h3></div>${sub?`<div class="sub">${esc(sub)}</div>`:''}<div class="snip">${snippet(p,tokens)}</div>${tg?`<div class="cardtags">${tg}</div>`:''}</div>`;
    }).join('')+'</div>';
    bodyEl.innerHTML=html;
    bodyEl.querySelectorAll('.card').forEach(c=>c.onclick=()=>openReader(c.dataset.slug));
    const r=document.getElementById('reset');if(r)r.onclick=()=>{state.q='';state.tab='all';state.tag=null;state.connected=null;renderMode();};
  }

  // ----- ASK (askClaude over wiki) -----
  async function doAsk(question){
    if(!question)return;
    state.q=question;
    bodyEl.innerHTML=`<div class="answer thinking"><div class="spin"></div>Thinking over your wiki…</div>`;
    const tokens=tokenize(question);
    const top=ranked(tokens,DATA).slice(0,6);
    const context=top.map(p=>({title:p.title,type:folderType(p),tags:p.tags.join(', '),content:p.body.slice(0,2200)}));
    const prompt=`You are the user's personal "second brain" assistant. Answer the question using the WIKI PAGES provided as your primary source. Cite pages by their exact title in **bold** when you use them. If the wiki does not cover something and you must use general knowledge, clearly prefix that part with "Beyond your wiki:". Be concise and direct. Question: "${question}"`;
    let answerText='', usedKnowledge=false;
    try{
      if(typeof window.cowork!=='undefined' && window.cowork.askClaude){
        const res=await window.cowork.askClaude(prompt, context);
        answerText=(typeof res==='string')?res:(res&&(res.text||res.answer||res.content))||JSON.stringify(res);
      }else{
        answerText="**Ask mode needs the Claude app.** This artifact's AI runs inside Cowork — open it there to get synthesized answers. (Search mode works everywhere.)";
      }
    }catch(e){ answerText="Couldn't reach the AI just now: "+esc(e.message||String(e)); }
    usedKnowledge=/beyond your wiki/i.test(answerText);
    // render
    const srcHtml=top.length?`<div class="srcwrap"><h4>Drew on these pages</h4><div class="srcs">`+top.map(p=>`<span class="conn" data-go="${p.slug}">${badge(p)}<span class="t">${esc(p.title)}</span></span>`).join('')+`</div></div>`:'';
    const kb=usedKnowledge?`<div class="kbnote">⚠ Part of this answer used Claude's general knowledge, not your wiki. Worth verifying or ingesting a source on it.</div>`:'';
    bodyEl.innerHTML=`<div class="answer"><div class="atext">${mdToHtml(answerText)}</div>${kb}${srcHtml}<div class="savednote">✓ Saved to your Questions log for the learning loop</div></div>`;
    bodyEl.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>openReader(a.dataset.go));
    // log it
    const qs=loadQs();qs.unshift({q:question,a:answerText.slice(0,600),usedKnowledge,sources:top.map(p=>p.slug),ts:Date.now(),ingested:false});saveQs(qs.slice(0,500));
  }

  // ----- Questions log -----
  function renderLog(){
    mc.innerHTML='';
    const qs=loadQs();
    const pending=qs.filter(x=>!x.ingested).length;
    let html=`<div class="loopbar"><b>Learning loop:</b> ${qs.length} question${qs.length!==1?'s':''} captured${pending?`, <b>${pending}</b> awaiting ingest into your wiki`:''}. Ask Claude to "ingest my questions" and the good answers become permanent wiki pages, then this app rebuilds smarter.</div>`;
    if(qs.length){html+=`<div class="qactions"><button class="smallbtn" id="exportQs">Export questions (JSON)</button><button class="smallbtn" id="clearQs">Clear log</button></div>`;}
    if(!qs.length){html+=`<div class="empty"><div class="big">✎</div>No questions yet.<br><span style="font-size:12.5px">Everything you ask in Ask mode is captured here.</span></div>`;}
    else html+='<div class="qlog">'+qs.map(x=>`<div class="qitem"><div class="qq">${esc(x.q)}</div><div class="qmeta"><span>${new Date(x.ts).toLocaleString()}</span>${x.usedKnowledge?'<span style="color:var(--entity)">used outside knowledge</span>':'<span style="color:var(--concept)">wiki-grounded</span>'}${x.ingested?'<span style="color:var(--concept)">✓ ingested</span>':'<span>pending</span>'}</div>${x.a?`<div class="qa">${esc(x.a)}</div>`:''}</div>`).join('')+'</div>';
    bodyEl.innerHTML=html;
    const ex=document.getElementById('exportQs');if(ex)ex.onclick=()=>{const blob=new Blob([JSON.stringify(loadQs(),null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='second-brain-questions.json';a.click();URL.revokeObjectURL(u);};
    const cl=document.getElementById('clearQs');if(cl)cl.onclick=()=>{if(confirm('Clear all captured questions?')){saveQs([]);renderLog();}};
  }

  // ----- reader -----
  const overlay=document.getElementById('overlay'),readerEl=document.getElementById('reader');let stack=[];
  function openReader(slug,push){const p=bySlug[slug];if(!p)return;if(push!==false)stack.push(slug);
    const rmeta=[];if(p.folder==='sources'){if(p.channel||p.author)rmeta.push(esc(p.channel||p.author));if(p.date)rmeta.push(esc(p.date));if(p.url)rmeta.push(`<a href="${esc(p.url)}" target="_blank" rel="noopener">source ↗</a>`);}else if(p.folder==='entities'&&p.category)rmeta.push(esc(p.category));if(p.updated)rmeta.push('updated '+esc(p.updated));
    const tags=p.tags.map(t=>`<div class="chip" data-rtag="${t.toLowerCase()}">${esc(t)}</div>`).join('');
    const outL=p.links.filter(l=>bySlug[l]),inL=(backlinks[slug]||[]).filter(s=>s!==slug&&bySlug[s]);
    let cH='';if(outL.length)cH+=`<div class="conns"><h4>Links to</h4><div class="connlist">`+outL.map(l=>`<div class="conn" data-go="${l}">${badge(bySlug[l])}<span class="t">${esc(bySlug[l].title)}</span></div>`).join('')+`</div></div>`;
    if(inL.length)cH+=`<div class="conns"><h4>Referenced by</h4><div class="connlist">`+inL.map(l=>`<div class="conn" data-go="${l}">${badge(bySlug[l])}<span class="t">${esc(bySlug[l].title)}</span></div>`).join('')+`</div></div>`;
    readerEl.innerHTML=`<div class="readbar"><button class="back" id="back">‹ Back</button></div><div>${badge(p)}</div><h1>${esc(p.title)}</h1>${rmeta.length?`<div class="rmeta">${rmeta.join('<span>·</span>')}</div>`:''}${tags?`<div class="rtags">${tags}</div>`:''}<div class="content">${mdToHtml(p.body)}</div>${cH}`;
    overlay.classList.add('open');overlay.scrollTop=0;
    readerEl.querySelector('#back').onclick=goBack;
    readerEl.querySelectorAll('[data-go]').forEach(a=>a.onclick=e=>{e.preventDefault();openReader(a.dataset.go);overlay.scrollTop=0;});
    readerEl.querySelectorAll('[data-rtag]').forEach(c=>c.onclick=()=>{closeReader();state.mode='search';state.tag=c.dataset.rtag;state.connected=null;document.querySelectorAll('.modebtn').forEach(x=>x.classList.toggle('active',x.dataset.mode==='search'));renderMode();window.scrollTo(0,0);});
  }
  function goBack(){stack.pop();if(stack.length)openReader(stack[stack.length-1],false);else closeReader();}
  function closeReader(){overlay.classList.remove('open');stack=[];}
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('open'))goBack();});

  renderMode();
})();
</script>
</body>
</html>
