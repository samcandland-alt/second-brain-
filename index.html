ain"], "updated": "2026-06-26", "body": "# LLM Wiki Pattern\n\nA methodology for building a personal knowledge base using an LLM not as a retrieval tool (RAG) but as an active writer and maintainer of a persistent, compounding wiki. Described by [[andrei-karpathy]] in April 2026.\n\n## Explanation\n\n### The core distinction: RAG vs. compounding wiki\n\n| RAG | LLM Wiki |\n|-----|----------|\n| Rediscovers knowledge on every query | Compiles knowledge once, keeps it current |\n| Cross-references built at query time | Cross-references already built |\n| No accumulation across sessions | Compounds with every source added |\n| Human reads source, LLM retrieves chunks | LLM reads source, updates structured pages |\n\n### Three layers\n\n1. **Raw sources** — immutable source documents (articles, papers, transcripts, notes). The LLM reads but never modifies these.\n2. **The wiki** — LLM-generated and LLM-maintained markdown pages: source summaries, entity pages, concept pages, overview, cross-references.\n3. **The schema** — an instruction document (CLAUDE.md / AGENTS.md) that tells the LLM how the wiki is structured and what workflows to follow. This is the key that turns the LLM from a chatbot into a disciplined wiki maintainer.\n\n### Three operations\n\n- **Ingest** — process a new source; a single source touches ~10–15 wiki pages.\n- **Query** — read index → relevant pages → synthesize; good answers get filed back as new pages.\n- **Lint** — periodic health check: orphan pages, contradictions, stale claims, missing cross-refs, data gaps.\n\n### Two navigation files\n\n- **index.md** — content-oriented catalog; the LLM reads this first on every query to find relevant pages.\n- **log.md** — chronological, append-only; gives the LLM a timeline of recent activity.\n\n### Division of labor\n\n- **Human:** curates sources, asks good questions, directs analysis, thinks about what it all means.\n- **LLM:** writes and maintains all wiki pages, updates cross-references, notes contradictions, does all the bookkeeping.\n\n### The Memex connection\n\nKarpathy explicitly connects this to Vannevar Bush's 1945 Memex concept — private, actively curated knowledge store with associative trails. Bush's unsolved problem was *who does the maintenance*. The LLM solves it.\n\n## Why this wiki exists\n\nThis Second Brain is built on this exact pattern. The architecture, directory structure, workflows, and CLAUDE.md schema are all instantiations of the LLM Wiki pattern.\n\n## Connections\n\n- See also: nothing yet — first meta-concept in the wiki\n- Authored by: [[andrei-karpathy]]\n- Evidenced in: [[llm-wiki-karpathy]]\n\n## Open questions / tensions\n\n- At what scale does the index.md approach break down and require a proper search engine (e.g. qmd with BM25/vector search)?\n- How does this pattern handle multi-user wikis (team knowledge bases)?\n- Karpathy describes this as intentionally abstract — the implementation details are for the human + LLM to work out together.", "links": ["andrei-karpathy", "llm-wiki-karpathy"]}, {"slug": "lonesome-dove", "folder": "entities", "type": "entity", "category": "product", "title": "Lonesome Dove", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "fiction", "western", "historical-fiction"], "updated": "2026-06-27", "body": "# Lonesome Dove\n\nPulitzer Prize-winning epic Western novel by Larry McMurtry following a cattle drive from Texas to Montana.\n\n## Overview\nA sweeping American Western saga following retired Texas Rangers Augustus McCrae and Woodrow Call as they lead a cattle drive from Lonesome Dove, Texas to Montana. Celebrated as one of the greatest American novels of the 20th century.\n\n## Key facts\n- Author: Larry McMurtry\n- Genre: Western / Historical Fiction\n- Awards: Pulitzer Prize for Fiction (1986)\n- Length (audiobook): ~34 hours\n\n## Connections\n- Related to: [[larry-mcmurtry]]\n- In Audible library: yes\n\n## Notes / open questions\n- 40th anniversary edition in library (2026 Audie Award Finalist for Best Fiction Narrator)", "links": ["larry-mcmurtry"]}, {"slug": "margaret-barker", "folder": "entities", "type": "entity", "category": "person", "title": "Margaret Barker", "author": "", "channel": "", "date": "", "url": "", "tags": ["temple-theology", "old-testament", "divine-feminine", "isaiah", "cambridge", "methodist", "scholar"], "updated": "2026-06-27", "body": "# Margaret Barker\n\nBiblical scholar and Temple Theology founder; Cambridge-trained; President of the Society for Old Testament Study (1998); awarded DD by the Archbishop of Canterbury in 2008 for her work on the Jerusalem Temple and origins of Christian liturgy. Retired Methodist preacher. Author of 17 books forming a sequential argument.\n\n## Overview\n\nMargaret Barker developed \"Temple Theology\" — a reconstruction of first-temple Israelite religion before the Deuteronomic reform of Josiah (623 BC). Her central argument: the Deuteronomists rewrote Israel's history and suppressed the older, richer theology that included the divine feminine (Asherah), visions of God, the angel priests, Wisdom as a divine figure, and the Melchizedek tradition. Christianity and the Book of Mormon, she argues, represent the recovery of first-temple theology rather than innovations.\n\n## Key facts\n\n- Academic home: Independent researcher (Cambridge-trained); elected President, Society for Old Testament Study 1998\n- Award: DD from Archbishop of Canterbury, 2008\n- Books: 17, forming a sequence. Key titles: *The Great Angel*, *The Gate of Heaven*, *Temple Theology*, *Mother of the Lord* (most recent)\n- Religious background: Retired Methodist preacher, 40+ years; has moved significantly from her fundamentalist Protestant origins\n- LDS connection: Non-LDS; initially surprised to discover how closely her scholarship aligns with LDS doctrine. First introduced to LDS scholars through Noel Reynolds. Now has many LDS friends and collaborators.\n- Collaborators: [[dave-butler]] (applied her work to the Book of Mormon); [[mike-day]] (builds on her framework for serpent symbolism and Documentary Hypothesis)\n\n## Core scholarly framework\n\nSee [[temple-theology]], [[deuteronomic-reform]], [[school-of-isaiah]], [[asherah]] for full detail.\n\n**The two-stream model:** First-temple theology (old believers, School of Isaiah) vs. second-temple Deuteronomism. Josiah's 623 BC reform was not a purification but an erasure — removing the Lady, the angels, theophany, the day of atonement's meaning, and the Melchizedek priesthood. The old believers preserved what was lost; it comes back in Jesus and in the Book of Mormon.\n\n## Connections\n\n- Related to: [[the-stick-of-joseph]], [[dave-butler]], [[mike-day]]\n- Concepts: [[temple-theology]], [[deuteronomic-reform]], [[school-of-isaiah]], [[asherah]], [[divine-family]], [[serpent-symbolism]]\n- Appears in: [[margaret-barker-divine-feminine]], [[margaret-barker-school-of-isaiah]], [[what-did-josiah-reform-barker-byu]]\n\n## Notes / open questions\n\n- Her book *Mother of the Lord* is the most recent and most directly relevant to the divine feminine material — worth reading\n- *The Great Angel* was the book that first convinced Noel Reynolds she was \"a kind of hidden Latter-day Saint\"\n- She has been part of the symposium \"Religion, Science and the Environment\" convened by the Ecumenical Patriarch since 1997 — has developed ecological implications of Temple Theology\n- Worth investigating her distinction between the \"eternal covenant\" (first-temple) and the law of Moses (second-temple Deuteronomy)", "links": ["asherah", "dave-butler", "deuteronomic-reform", "divine-family", "margaret-barker-divine-feminine", "margaret-barker-school-of-isaiah", "mike-day", "school-of-isaiah", "serpent-symbolism", "temple-theology", "the-stick-of-joseph", "what-did-josiah-reform-barker-byu"]}, {"slug": "margaret-barker-divine-feminine", "folder": "sources", "type": "source", "category": "", "title": "Margaret Barker | Solomon's Temple, Isaiah, and The Divine Feminine", "author": "Margaret Barker", "channel": "The Stick of Joseph", "date": "2024-08-18", "url": "https://www.youtube.com/watch?v=44ruz-_KjAM", "tags": ["margaret-barker", "divine-feminine", "asherah", "el-shaddai", "temple-theology", "heavenly-mother", "book-of-mormon", "hebrew"], "updated": "2026-06-27", "body": "# Margaret Barker | Solomon's Temple, Isaiah, and The Divine Feminine\n\n## Summary\n\nMargaret Barker (Temple Theology scholar, President of the Society for Old Testament Study 1998, Methodist preacher, Cambridge) visits The Stick of Joseph to discuss the divine feminine in ancient Israelite religion. She argues that the thousands of Judean pillar figurines found around Jerusalem represent a divine feminine figure worshipped alongside Yahweh in the first temple — the \"Great Lady\" — who was systematically erased by Deuteronomic reformers. Dave Butler extends her analysis into the Book of Mormon, showing Alma's name, baptism location, and invoked authority all carry markers of the Lady.\n\n## Key takeaways\n\n- **El Shaddai = \"God with breasts.\"** The most common translation of God's patriarchal name (Gen 17:1) is \"God Almighty,\" but *shaddai* literally means \"breasts\" (*shad* = breast). The natural translation is \"the God with breasts\" — a divine feminine title. Genesis 49's blessing of Joseph invokes *Shaddai* alongside *shad* and *raham* (breasts and womb) explicitly.\n- **Thousands of Judean pillar figurines.** The most common archaeological find around first-temple Jerusalem is a 6-inch nursing-mother figurine. Many were systematically smashed — suggesting a concerted effort to destroy the Lady's images. Initially dismissed as Pagan dolls; Barker argues they represent the Great Lady of the Temple.\n- **Asherah = the tree of life.** The Asherah in the temple was a stylized tree, symbol of wisdom. Josiah removed and burned it. In Proverbs 3:13-18, Wisdom is called \"a tree of life\" — and the passage is framed by *ashrey* (blessed/happy), word-playing on the name Asherah. She is the fountain of life, the lifegiving spring, the tree at the center of the Garden.\n- **Deborah as the Great Lady.** Judges 4-5: Deborah (*d/g* are the same archaic letter → *gevira*, \"great lady\"), \"Lady of the Torches\" (*lapidot*), prophetess, judge, sits under the palm tree (sign of holy-of-holies knowledge). Mary in Christian tradition inherits all these titles.\n- **The burning bush as feminine.** Deuteronomy 33:16 (\"the favor of him that dwelt in the bush\") uses an archaic feminine ending — likely \"the woman who dwelt in the bush.\" Orthodox churches paint the burning bush as Mary. The burning bush = the tree of life = the Lady.\n- **Adam returns to dust because he lost the Lady.** Adam was made from dust compacted into clay by a mist/fountain (*'ed*) — a title of the Lady. When they lost access to the tree of life (the Lady), they also lost her water, and Adam returns to dust (Gen 3:19). Mary as \"life-giving spring\" in Orthodox iconography preserves this.\n- **Isaiah 6 and blindness.** Isaiah 6:9-10 (the most-quoted Isaiah passage in the NT): the punishment for rejecting the Lady is losing perception — eyes that don't see, ears that don't hear, hearts that don't understand. Jesus quotes this when explaining why people don't understand him.\n- **Book of Mormon — Alma:** *Elm* (Alma's name in Hebrew) = young man / to conceal / virgin / eternal — all titles/attributes of the Lady. Alma baptizes at the Waters of Mormon: a fountain of pure water + thicket of trees + place of beasts (beasts of *Shaddai*). He baptizes with \"authority from the Almighty God\" (*El Shaddai* = the Lady). The Hebrew wordplay is intact.\n- **Mary bears all the titles of the Temple Lady.** Orthodox Marian theology (the Akathist Hymn, icons, \"theotokos\") preserves the attributes of the Lady that were suppressed from Protestant/canonical sources.\n\n## Entities mentioned\n\n[[margaret-barker]], [[the-stick-of-joseph]], [[dave-butler]]\n\n## Concepts discussed\n\n[[asherah]], [[divine-family]], [[temple-theology]], [[deuteronomic-reform]], [[serpent-symbolism]]\n\n## Contradictions / tensions with existing wiki\n\nMassively expands [[divine-family]] and creates [[asherah]] as a named entity in the wiki. Barker's non-LDS scholarship confirms from outside what [[family-of-heaven-dave-butler]] argues from inside: the Lady was always in the temple. Connects to [[kabbalistic-tree-of-life]] (the Tree of Life = Asherah = the Lady; the Kabbalistic Shekhinah is the same figure) and to [[lehis-dream]] (Lehi's Tree of Life = the Lady, per Barker's framework).\n\n## Quotes worth keeping\n\n> \"Who was she? Whom did she offend, that she ended up written out of the way we read the Bible — and ended up, for Bible-based archaeologists, in the trash?\"\n\n> \"The natural way to translate *El Shaddai* is 'the God with breasts.'\"\n\n> \"The lady is taken out — she's burned, she's crushed to dust... and then the very thing that distinguished Adam from dust (the fountain, the water) is taken from him.\"\n\n> \"Mary as the life-giving spring — I carry a little card of it in my handbag all the time because it's my absolute favorite icon.\"", "links": ["asherah", "dave-butler", "deuteronomic-reform", "divine-family", "family-of-heaven-dave-butler", "kabbalistic-tree-of-life", "lehis-dream", "margaret-barker", "serpent-symbolism", "temple-theology", "the-stick-of-joseph"]}, {"slug": "margaret-barker-school-of-isaiah", "folder": "sources", "type": "source", "category": "", "title": "Margaret Barker | The School of Isaiah, The Temple, and The Book of Mormon", "author": "Margaret Barker", "channel": "The Stick of Joseph", "date": "2024-08-04", "url": "https://www.youtube.com/watch?v=PjuTrmCd2hY", "tags": ["margaret-barker", "school-of-isaiah", "deuteronomists", "temple-theology", "lehi", "book-of-mormon", "first-temple", "second-temple"], "updated": "2026-06-27", "body": "# Margaret Barker | The School of Isaiah, The Temple, and The Book of Mormon\n\n## Summary\n\nMargaret Barker's first interview with The Stick of Joseph, recorded in England. She explains the two-stream model of Israelite religion: the Deuteronomists (reformers who stripped the temple of angels, visions, the divine feminine, and the day of atonement) vs. the School of Isaiah (old believers who preserved first-temple theology and went into exile east of the Jordan). Lehi fits squarely in the School of Isaiah camp — fleeing a city the old believers saw as already apostate. Barker (non-LDS Methodist) was surprised to discover how closely her independent scholarship aligns with LDS doctrine.\n\n## Key takeaways\n\n- **Two streams of Israelite religion.** The Deuteronomists gained influence in Jerusalem c. 750 BC and came to dominate under King Josiah (623 BC). They rewrote the history books (Samuel, Kings) to cast old-believer kings as wicked. The School of Isaiah = the old believers who preserved first-temple theology, went into exile, and kept the older books and traditions.\n- **What the Deuteronomists removed.** The divine feminine (Asherah/the Lady), angels and heavenly host, the ability to *see* God (theophany), God becoming incarnate in human form, women weaving in the temple, the Day of Atonement's inner meaning, the musical prophet-priests (possibly the \"angel priests\").\n- **Jesus was a first-temple man, not a second-temple man.** \"Blessed are the pure in heart for they shall see God\" — first-temple theology (the high priest had access to God in the holy of holies). The Deuteronomists said no one could see God. Jesus's Beatitudes are an old-believer manifesto.\n- **Jesus's \"whip of cords\" = the Day of Atonement high priestly action.** The high priest on Yom Kippur sprinkled blood \"with the action of a whip.\" Jesus's tiny whip of cords in the temple cleansing was not for driving oxen — it was the symbolic high-priestly action of the Day of Atonement, claiming the temple back. Temple authorities recognized it immediately and were alarmed.\n- **The temple = microcosm of creation.** The Veil = matter / the four elements (woven from red, blue, purple wool and white linen). The holy of holies = the eternal realm beyond matter, outside time. The Six Days of creation correspond to the six days of building the tabernacle; Day One (= Holy of Holies) = angels/the eternal. Whatever is done in the temple affects the land; whatever is done in the land registers as pollution in the temple.\n- **Chronicles preserves what Kings erased.** The Deuteronomists (who wrote Kings) omitted the golden chariot of the cherubim, the musical prophet-priests, and other items. Chronicles (*Paralipomenon* = \"the things left out\") preserves them. The singing prophets of David's three guilds were likely the angel-priests Josiah destroyed.\n- **The LDS temple preserves the ancient temple ascent.** Barker visited the Rome and Paris LDS temples and recognized the ancient pattern of ascending movement through progressively higher spaces toward light — the original temple experience. \"It was the holy of holies alive and well.\"\n- **Barker's surprise at LDS alignment.** Noel Reynolds read Barker's book *The Great Angel* and thought she was \"a kind of hidden Latter-day Saint.\" Her independent scholarship arrived at LDS doctrine without the Book of Mormon.\n- **Lehi in the School of Isaiah.** The Book of Mormon opens with Lehi leaving Jerusalem c. 600 BC — precisely when the Deuteronomist-influenced second temple Jerusalem was being established. The \"wicked\" Lehi fled = the apostate generation who rejected the old believer tradition.\n\n## Entities mentioned\n\n[[margaret-barker]], [[the-stick-of-joseph]], [[dave-butler]]\n\n## Concepts discussed\n\n[[school-of-isaiah]], [[deuteronomic-reform]], [[temple-theology]], [[divine-family]], [[asherah]], [[pardes]]\n\n## Contradictions / tensions with existing wiki\n\nDirectly explains *why* [[mike-day]] and [[dave-butler]]'s serpent symbolism and divine family are absent from the \"standard\" Bible: the Deuteronomists removed them. The Book of Mormon's preservation of these elements (northern text, brass plates pre-Josiah) now has an explicit explanation in Barker's framework. Connects to [[serpent-symbolism]]: Hezekiah destroying Nehushtan was the first-temple/second-temple boundary event.\n\n## Quotes worth keeping\n\n> \"So we've only got the history as they wanted it told.\"\n\n> \"Jesus came to restore the temple — the true temple.\"\n\n> \"If there were prophets, singing prophets in the temple... that sounds an awful lot like angel priests to me. And that's what he [Josiah] destroyed.\"\n\n> \"Where there is no prophetic vision, the people unravel.\" — Proverbs 29:18 (Barker's rendering: \"the people unravel,\" not \"perish\")\n\n> \"I was watching, absolutely fascinated — because I had expected that this would all be completely strange to me, and in fact I recognized everything. I thought: I've seen this somewhere before.\" [On visiting an Orthodox church and recognizing the ancient temple service]", "links": ["asherah", "dave-butler", "deuteronomic-reform", "divine-family", "margaret-barker", "mike-day", "pardes", "school-of-isaiah", "serpent-symbolism", "temple-theology", "the-stick-of-joseph"]}, {"slug": "matt-wolfe", "folder": "entities", "type": "entity", "category": "person", "title": "Matt Wolfe", "author": "", "channel": "", "date": "", "url": "", "tags": ["ai", "youtube", "content-creator", "second-brain", "obsidian"], "updated": "2026-06-26", "body": "# Matt Wolfe\n\nAI-focused YouTube creator and newsletter publisher; runs FutureTools.io. Known for practical AI tutorials and tool reviews for a general audience.\n\n## Overview\n\nMatt Wolfe covers AI tools, news, and workflows on YouTube and via his FutureTools newsletter. His May 2026 video on building an AI second brain extended [[andrei-karpathy]]'s [[llm-wiki-pattern]] with journaling and CRM functionality, using Obsidian as the frontend and OpenAI Codex as the agent.\n\n## Key facts\n\n- YouTube channel: Matt Wolfe\n- Newsletter/site: FutureTools.io\n- Focus: AI tools and workflows for practical, non-technical users\n- Social: @mreflow on X/Twitter\n\n## Connections\n\n- Concepts: [[llm-wiki-pattern]]\n- Builds on work of: [[andrei-karpathy]]\n- Appears in: [[build-ai-second-brain-matt-wolfe]]", "links": ["andrei-karpathy", "build-ai-second-brain-matt-wolfe", "llm-wiki-pattern"]}, {"slug": "mental-performance", "folder": "concepts", "type": "concept", "category": "", "title": "Mental Performance", "author": "", "channel": "", "date": "", "url": "", "tags": ["mental-performance", "psychology", "performance", "self-belief", "interference", "patterns", "habits"], "updated": "2026-06-26", "body": "# Mental Performance\n\n[[craig-manning]]'s framework for human performance as a science: the consistent elimination of mental interference through the cultivation of task-orientation, additive thought patterns, self-belief, and daily habituated action.\n\n## Explanation\n\nManning treats performance as an equation:\n\n> **Potential + Training − Interference = Performance**\n\nMost high performers have sufficient potential and training. What separates the best from the rest is not more talent — it's *less interference*. The three primary sources of interference are: self-doubt, negative intelligence (negative thought patterns that take action), and worrying about what others think.\n\n## The Four Intelligences\n\nManning frames humans as having four types of intelligence, all of which must be aligned for peak performance:\n\n| Intelligence | What it is | Question it answers |\n|---|---|---|\n| Spiritual | Purpose, direction, values, \"why\" | Why am I doing this? |\n| Emotional | Energy, passion, fuel | How much do I care? |\n| Mental | How you use your mind | Am I thinking constructively? |\n| Physical | Action, doing | What am I actually doing? |\n\nThe physical (doing) is the output of the other three. The mental determines how cleanly the other intelligences convert into action.\n\n## The Thought Pattern Hierarchy\n\nManning describes a hierarchy from least to most useful:\n\n1. **Subtractive patterns** — Focus on what *not* to do (\"don't overthink,\" \"don't mess up\"). The mind cannot process negatives, so these patterns produce the exact behavior they warn against.\n2. **Negative patterns** — Negative thoughts about the situation or self. These are paralyzing.\n3. **Positive patterns** — \"Everything will be fine,\" \"stay positive.\" Better than negative but insufficient because they have *no action attached*.\n4. **Additive patterns** — Proactive, action-oriented thoughts: \"I will do X,\" \"I can do this by doing Y.\" These are the only patterns that actually change behavior, because they include an action.\n\nOnly additive patterns create sustainable change. Positive thinking without action is ineffective; it's a comfort tool, not a performance tool.\n\n## The Seinfeld Chain\n\nThe most reliable method for installing additive patterns (habits):\n- Commit to one practice every day\n- Mark a calendar each day you do it (the chain)\n- The goal is to \"keep the chain alive\" (not \"don't break the chain\" — negative framing)\n- The chain's value: *consistency* conditions the subconscious. The subconscious doesn't distinguish good from bad practice — it encodes what you repeat.\n\n> \"Practice makes permanent, not perfect. Be very careful what you choose to work on.\"\n\n## Self-Belief as the Core Skill\n\nSelf-belief is not a feeling or attitude — in Manning's framework, it is a **skill**: proactive self-talk (\"I can do this, I will do this\") that is additive (action-attached) and positive. This is the specific antidote to self-doubt, which is additive-negative (action-attached but destructive).\n\nThe 3-2-1 daily review:\n- 3 things I did well today\n- 1 thing I can improve\n- Gets learning *in the head* where behavior is driven, not just in notebooks\n\n## The urgency of time\n\nManning's father died of cancer at 52 (diagnosed at 48). This shapes his entire philosophy: time is finite; what you choose to do with it is the real question. This grounds his focus on consistency and daily deliberate action rather than waiting for motivation.\n\n## Connections\n\n- See also: [[task-vs-ego-orientation]]\n- Used by: [[craig-manning]]\n- Evidenced in: [[craig-manning-d2dcon-power-of-mind]], [[craig-manning-overcoming-egos-tedxbyu]]\n\n## Open questions / tensions\n\n- How does the \"four intelligences\" framework map to established psychological models (e.g., tripartite models of mind, multiple intelligences)?\n- Manning emphasizes the *doing* (physical) as the output of all other intelligences — is this behaviorism or something more?\n- The performance equation (Potential + Training − Interference = Performance) implies interference is the key variable. Worth stress-testing: are there cases where raw talent or training gaps can't be overcome by eliminating interference alone?", "links": ["craig-manning", "craig-manning-d2dcon-power-of-mind", "craig-manning-overcoming-egos-tedxbyu", "task-vs-ego-orientation"]}, {"slug": "mike-day", "folder": "entities", "type": "entity", "category": "person", "title": "Mike Day", "author": "", "channel": "", "date": "", "url": "", "tags": ["lds", "book-of-mormon", "hebrew", "serpent", "ancient-israel", "youtube"], "updated": "2026-06-26", "body": "# Mike Day\n\nLDS scripture scholar and YouTuber; runs the channel @talkingscripture. Collaborates with [[the-stick-of-joseph]] on ancient Near Eastern scripture topics, particularly serpent symbolism and the northern/southern documentary tradition in the Old Testament.\n\n## Overview\n\nMike Day brings deep familiarity with biblical scholarship — documentary hypothesis, second temple studies, Ugaritic texts — to LDS scripture discussions. In the serpent episode, he led the exploration of seraph/nachash distinctions, the J/E source traditions, and the Book of Mormon as a northern Israelite text.\n\n## Key contributions seen in sources\n\n- Seraph vs. nachash distinction in Numbers 21 and Isaiah 6\n- Numbers 21 as a northern (E) text connecting to Book of Mormon brass plates\n- The serpent in Eden as potentially a divine being (seraph from another world), not simply Satan\n- Referenced scholarship: James H. Charlesworth (*The Good and Evil Serpent*), Richard Elliott Friedman (*The Bible with Sources Revealed*), J.J.M. Roberts (First Isaiah commentary)\n\n## Connections\n\n- Related to: [[the-stick-of-joseph]], [[dave-butler]]\n- Concepts: [[serpent-symbolism]]\n- Appears in: [[ancient-meaning-of-serpent-stick-of-joseph]]\n- YouTube: @talkingscripture", "links": ["ancient-meaning-of-serpent-stick-of-joseph", "dave-butler", "serpent-symbolism", "the-stick-of-joseph"]}, {"slug": "craig-manning-overcoming-egos-tedxbyu", "folder": "sources", "type": "source", "category": "", "title": "Overcoming Our Egos | Craig Manning | TEDxBYU", "author": "Craig Manning", "channel": "TEDx Talks", "date": "2019-05-03", "url": "https://www.youtube.com/watch?v=SalS7dlNKRU", "tags": ["mental-performance", "ego", "task-orientation", "cognitive-control", "humility", "self-belief"], "updated": "2026-06-26", "body": "# Overcoming Our Egos | Craig Manning | TEDxBYU\n\n## Summary\n\nCraig Manning's TEDx talk at BYU argues that the most important mental skill is being task-oriented rather than ego-oriented. The ego is always seeking approval through outcomes — and since outcomes come from the future, ego-orientation breeds fear, anxiety, and under-performance under pressure. Task orientation focuses on the skill being executed right now, enabling persistence, hard work, appropriate goal-setting, and performance under pressure. The closing prescription: \"confident humility.\"\n\n## Key takeaways\n\n- **Ego-orientation vs. task-orientation** is the central framework. These are binary — they cannot coexist in the conscious mind at the same time.\n  - **Ego:** seeks approval → needs outcomes → fear (futures-based) → anxiety → choking/memory slips → doesn't persist, doesn't work hard, sets extreme goals, can't perform under pressure.\n  - **Task:** focuses on skill execution → sees growth → motivated → persists → works hard → sets stretch goals → performs under pressure.\n- **All fear originates from the future.** The croc isn't scary — the thought of what it will do is. This is why outcome-orientation (which lives in the future) breeds fear.\n- **Perfectionists behave like ego-oriented people** because they too are outcome-oriented (seeking approval from others through results).\n- **The Olga story:** A tennis player ranked 61st who nearly beat the #1 player. When task-focused she played brilliantly. The moment she thought \"I could win this\" (outcome/ego), she collapsed. Manning's intervention — \"hurry up and get this over with, I'm hungry\" — snapped her out of ego and back to task.\n- **The skills don't disappear when you're ego-driven.** But you can't unlock them. Talent + knowledge is useless without the ability to unlock it — which requires task orientation.\n- **Confident humility.** Not arrogance, not self-doubt. Confident in your own skills; humble enough to know no one is entitled to success and the task always requires your attention.\n\n## Entities mentioned\n\n[[craig-manning]]\n\n## Concepts discussed\n\n[[task-vs-ego-orientation]], [[mental-performance]]\n\n## Contradictions / tensions with existing wiki\n\nComplements [[craig-manning-d2dcon-power-of-mind]] — the D2DCON talk emphasizes additive patterns and self-belief; this talk digs deeper into the ego/task dichotomy as the underlying mechanism. No contradiction — two angles on the same framework.\n\n## Quotes worth keeping\n\n> \"The key to success isn't so much how talented you are or how much information you've stored in your mind, but how well you use your mind. After all, what's the point having talent and knowledge if you can't unlock it?\"\n\n> \"Task and ego can't occupy the mind at the same time. Your conscious mind truly is binary.\"\n\n> \"Confident humility. Confident in your skills, but humble enough to recognize no one's entitled to success.\"\n\n> \"Playing to win\" (task) vs. \"playing not to lose\" (ego).", "links": ["craig-manning", "craig-manning-d2dcon-power-of-mind", "mental-performance", "task-vs-ego-orientation"]}, {"slug": "overview", "folder": "root", "type": "overview", "category": "", "title": "Overview", "author": "", "channel": "", "date": "", "url": "", "tags": [], "updated": "2026-06-27", "body": "# Overview\n\n*The front page of this wiki. Reflects the current state of accumulated knowledge. Updated by the LLM as new sources arrive and the synthesis evolves.*\n\n---\n\n## What this wiki is about\n\nThis wiki spans four domains that are converging into a single, unified picture:\n\n1. **Ancient Hebrew / Book of Mormon interpretation** — the Book of Mormon read through ancient Israelite first-temple theology, Kabbalah, serpent symbolism, the divine family, and Barker's Temple Theology. The standard Western reading of the Bible misses nearly all of this.\n\n2. **Temple Theology** (Margaret Barker's framework) — the most significant new axis in this wiki. Barker's independent non-LDS scholarship reconstructs first-temple Israelite religion and shows how the Deuteronomic reform systematically erased the divine feminine (Asherah), angels, visions of God, and the Melchizedek tradition. The Book of Mormon and early Christianity, by her reading, are heirs to what was suppressed.\n\n3. **Human performance** — Craig Manning's science of the performing mind: eliminating interference, task vs. ego orientation, additive patterns. Kipling's \"If—\" as the poetic parallel.\n\n4. **LLM-based knowledge management** — the methodology for building and maintaining this wiki.\n\n---\n\n## Current synthesis\n\n### The unified picture emerging from the theological sources\n\nThe sources in this wiki are converging on a single thesis, approached from multiple angles by scholars with no collaboration:\n\n**The dominant form of Western Christianity and Judaism is not the original Israelite religion — it is a 7th-century BC reform (Josiah) imposed on top of a richer, older theology that included:**\n- A divine family (Father, Mother, Son) attested in Ugaritic texts and first-temple inscriptions\n- A divine feminine in the temple (Asherah = the tree of life, Wisdom, El Shaddai = \"God with breasts\")\n- The ability to see God (theophany) — directly contradicted by Deuteronomy\n- Angel priests and a divine council\n- The Melchizedek priesthood as a messianic tradition\n- The Day of Atonement as the high priest's passage into the holy of holies\n\n**This older theology survived in:**\n- The School of Isaiah (Lehi's tradition; the brass plates)\n- The Dead Sea Scroll community\n- Early Christianity (Jesus operated entirely within first-temple theology)\n- Kabbalah (Shekhinah = the Lady; the Sefirot = the divine structure)\n- Orthodox Christianity's Marian theology (Mary inherits all the Lady's titles)\n- The Book of Mormon (preserves pre-Josiah northern text; El Shaddai in Alma; serpent typology; tree of life)\n- **LDS restoration** — which per Barker, Dave Butler, and Rob Kay, is not a novelty but a recovery\n\n**Jordan Peterson arrives at the same place from psychology:** the abstract, impersonal God (Platonic/Aristotelian) is the wrong one for human life. We are in relationship with the structure of being — a personal, familial, responsive God is both historically original and psychologically necessary.\n\n**Jeffrey R. Holland arrives at the same place from faith:** the God who responds to genuine insufficiency admitted on our knees is not the Unmoved Mover. The Lord who heals the afflicted son because a father says \"I believe; help thou mine unbelief\" is a relational, familial God.\n\n### The Book of Mormon as a first-temple archive\n\nThe Book of Mormon is increasingly legible as a northern Israelite tribal text (Manasseh/Ephraim) compiled from pre-Josiah brass plates, preserving:\n- El Shaddai / the Lady (Alma's baptism, Mosiah 18)\n- Serpent-on-the-pole typology (1 Nephi 17:41; Alma 33, 37; Helaman 8)\n- Lehi's Tree of Life = the Asherah / divine feminine\n- Isaiah quotations from the full first-temple Isaiah tradition\n- A divine family (Father, Son — and by implication, through Barker's framework, the Mother)\n\n### On human performance\n\nManning's framework remains a distinct thread: task vs. ego orientation, the performance equation (Potential + Training − Interference = Performance), and the Seinfeld chain. Kipling's \"If—\" is the poetic canonical form of the same insight: treat triumph and disaster as impostors; hold on when there is nothing in you except the will to hold on.\n\nPeterson bridges the two domains: \"the problem that won't let you go\" is both a description of genuine scientific inquiry *and* a description of genuine faith. Both begin from admitted insufficiency; both reach into the unknown; both receive revelation that must be tested.\n\n---\n\n## Key themes\n\n- [[temple-theology]] and [[deuteronomic-reform]] — the central new axis\n- [[asherah]] — the Lady of the Temple, the tree of life, El Shaddai, Heavenly Mother\n- [[school-of-isaiah]] — the old believers; Lehi's tradition; brass plates\n- [[divine-family]] — Father, Mother, Son in ancient Israelite religion; LDS restoration\n- [[serpent-symbolism]] — seraph/nachash; Numbers 21 → Isaiah 6 → John 3:14\n- [[kabbalistic-tree-of-life]] and [[kabbalah]] — esoteric preservation of first-temple theology\n- [[pardes]] — four levels of scripture reading\n- [[lehis-dream]] — the Tree of Life = Asherah\n- [[task-vs-ego-orientation]] and [[mental-performance]] — Craig Manning's framework\n- [[faith-and-doubt]] — Holland and Peterson converge\n- [[stories-as-hierarchies-of-value]] — Peterson's mythology framework\n- [[llm-wiki-pattern]] — the methodology underlying this wiki\n\n---\n\n## Key entities\n\n- [[margaret-barker]] — the most significant new entity; Temple Theology scholar; non-LDS confirmation of LDS doctrine\n- [[the-stick-of-joseph]] — primary source channel for temple theology and Book of Mormon scholarship\n- [[dave-butler]] and [[mike-day]] — core scholarly voices; collaborators with Barker\n- [[rob-kay]] — Hebrew/Kabbalistic Book of Mormon interpretation\n- [[jordan-b-peterson]] — psychological and mythological convergence on the personal, familial God\n- [[jeffrey-r-holland]] — LDS apostle on faith and doubt\n- [[craig-manning]] — mental performance science\n- [[andrei-karpathy]] and [[matt-wolfe]] — LLM wiki methodology\n\n---\n\n## Open questions\n\n- Dave Butler's claim that Genesis 49 explicitly names Father, Mother, and Son — verify against the text\n- The Baal/Christ mapping in the Ugaritic triad — does the structural parallel require the specific identification?\n- Barker's Therapeutae connection (Egypt, T-R-P consonants, *teraphim*) — mainstream or niche?\n- How does Kipling's \"If—\" connect to the LDS principle of \"acting as if\" in faith practice?\n- The correspondence of the Six Days of creation with the Six Days of building the tabernacle — full development needed\n- Does the Dead Sea Scroll Melchizedek text explicitly identify him as divine/messianic, or is this Barker's inference?\n\n---\n\n## Stats\n\n| | |\n|---|---|\n| Sources ingested | 13 |\n| Entity pages | 10 + 12 product stubs |\n| Concept pages | 16 |\n| Last updated | 2026-06-27 |\n\n---\n\n*See [[index]] for the full catalog. See [[log]] for activity history.*", "links": ["andrei-karpathy", "asherah", "craig-manning", "dave-butler", "deuteronomic-reform", "divine-family", "faith-and-doubt", "index", "jeffrey-r-holland", "jordan-b-peterson", "kabbalah", "kabbalistic-tree-of-life", "lehis-dream", "llm-wiki-pattern", "log", "margaret-barker", "matt-wolfe", "mental-performance", "mike-day", "pardes", "rob-kay", "school-of-isaiah", "serpent-symbolism", "stories-as-hierarchies-of-value", "task-vs-ego-orientation", "temple-theology", "the-stick-of-joseph"]}, {"slug": "pardes", "folder": "concepts", "type": "concept", "category": "", "title": "PaRDeS — Four Levels of Hebrew Scriptural Interpretation", "author": "", "channel": "", "date": "", "url": "", "tags": ["hebrew", "interpretation", "scripture", "kabbalah", "book-of-mormon"], "updated": "2026-06-26", "body": "# PaRDeS — Four Levels of Hebrew Scriptural Interpretation\n\nA Hebrew acronym for four simultaneous levels of meaning in sacred texts. Pronounced \"Pardes\" (also means \"paradise/orchard\"). Each level is true simultaneously — they are not in competition.\n\n## Explanation\n\nThe acronym **PaRDeS** stands for:\n\n| Letter | Hebrew | Level | Description |\n|--------|--------|-------|-------------|\n| P | **Peshat** | Literal | The plain, surface reading. What literally happened. |\n| R | **Remez** | Hint/Allegory | A word or phrase that points you elsewhere in scripture — the first occurrence of a term, a shared name, a pattern that references another story. \"Lehi dwelt in a tent\" → points the Jewish reader to Moses's Mishkan in the wilderness. |\n| D | **Derash** | Commentary | Two texts used as commentary on each other. Isaiah in the Book of Mormon is Derash. Also the practice of *darshing* — two people discussing scripture to derive new meaning through dialogue. Root of \"midrash.\" |\n| S | **Sod** | Mystery | The mystical/esoteric layer. Things pertaining to the creation, the mysteries of godliness, the unseen spiritual world. Pre-creation knowledge given to Adam, passed through Enoch, Abraham, Moses. This is the layer of the ancient prophetic science. |\n\n## Why it matters for the Book of Mormon\n\nRob Kay's argument: Western/Christian readers almost exclusively read at the Peshat level, missing the Remez, Derash, and Sod layers that Nephi and other Book of Mormon authors embedded intentionally for readers trained in the Israelite tradition.\n\nExamples from the episode:\n- \"Nephi, being exceedingly young\" → Remez back to Enoch (the lad/initiate), then to Christ's teaching to become as a little child → the same pattern across all three.\n- \"My father dwelt in a tent\" → Remez to Moses's Mishkan (tabernacle).\n- \"I did cry unto the Lord... the mysteries of God\" → the mysteries of godliness = Sod level, ancient prophetic science.\n- Lehi's Dream itself is written to be experienced vicariously — a Sod-level initiatory experience, not just a narrative.\n\n## The experiential reading posture\n\nAt the Sod level especially, scripture is meant to be *entered* — the reader becomes the character (Lehi, Nephi, even Laman) to have the experience, not merely observe it. This is the Hebraic mode of meditation: not going to emptiness (transcendental meditation) but going toward *unity/oneness with God* (*yichud*, unification — the root of \"at-one-ment\").\n\n## Connections\n\n- See also: [[kabbalah]], [[kabbalistic-tree-of-life]], [[lehis-dream]]\n- Used by: [[rob-kay]]\n- Evidenced in: [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Open questions / tensions\n\n- How much of the Sod layer was intentionally encoded by Nephi vs. recognized retrospectively? Rob assumes intentional encoding; this is a faith claim worth holding with nuance.\n- The Derash method (darshing) as structured dialogue is interesting as a model for how to engage with scripture — worth developing as a practice.", "links": ["jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "lehis-dream", "rob-kay"]}, {"slug": "rob-kay", "folder": "entities", "type": "entity", "category": "person", "title": "Rob Kay", "author": "", "channel": "", "date": "", "url": "", "tags": ["jewish-convert", "lds", "kabbalah", "hebrew", "book-of-mormon-scholar"], "updated": "2026-06-26", "body": "# Rob Kay\n\nJewish convert to the LDS church, scholar of ancient Hebrew, Kabbalah, and Merkaba mysticism, and a practitioner who reads the Book of Mormon through the lens of ancient Israelite prophetic tradition.\n\n## Overview\n\nRob Kay spent 21 years as a practicing religious Jew before being baptized into the Church of Jesus Christ of Latter-day Saints over 30 years ago. He brings a rare dual background — deep training in Hebrew prophetic schools, Kabbalah, Merkaba mysticism, and Masonic tradition — to the study of the Book of Mormon. His core thesis is that the Book of Mormon encodes ancient Israelite prophetic science that the Western/Christian reader systematically misses.\n\n## Key facts\n\n- Background: 21 years as a practicing Jew before LDS baptism; 30+ years as LDS member\n- Expertise: Ancient Hebrew, Kabbalah (receiving tradition), Merkaba/Heikhalot mysticism, Freemasonry, Torah study\n- Core argument: The Book of Mormon draws from the same ancient prophetic source as Kabbalah — Moses, Enoch, and pre-Israelite traditions — and encodes it in symbolic narrative designed to be lived experientially, not just read\n- Appeared on [[the-stick-of-joseph]] twice; described as a \"channel favorite\"\n\n## Connections\n\n- Appears on: [[the-stick-of-joseph]]\n- Concepts he teaches: [[kabbalistic-tree-of-life]], [[pardes]], [[kabbalah]], [[lehis-dream]], [[merkaba-mysticism]], [[72-names-of-god]]\n- Appears in: [[jewish-convert-decodes-lehis-dream-rob-kay]]\n\n## Notes / open questions\n\n- Rob mentions an Orthodox rabbi friend he discusses these things with — a potential future source/perspective\n- His claim that ALL Book of Mormon names (including Jaredite) are Hebrew constructs is a significant and verifiable claim worth further research\n- His reading of Moroni 10 gifts of the Spirit mapping onto the Sefirot (bottom-up) is worth exploring in detail", "links": ["72-names-of-god", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "lehis-dream", "merkaba-mysticism", "pardes", "the-stick-of-joseph"]}, {"slug": "school-of-isaiah", "folder": "concepts", "type": "concept", "category": "", "title": "School of Isaiah", "author": "", "channel": "", "date": "", "url": "", "tags": ["isaiah", "old-believers", "first-temple", "lehi", "book-of-mormon", "exile", "prophecy", "deuteronomists"], "updated": "2026-06-27", "body": "# School of Isaiah\n\n[[margaret-barker]]'s term for the group of \"old believers\" — Isaiah's disciples and their descendants — who preserved first-temple theology after the Deuteronomic reform, carried the older books and traditions into exile east of the Jordan, and whose line of transmission connects to both the Dead Sea Scroll community and, arguably, to Lehi and the Book of Mormon.\n\n## Explanation\n\nThe School of Isaiah was not a formal institution but a network of teachers, prophets, and preservers who refused to accept the Deuteronomic reform as legitimate. They called the second-temple worshippers the \"apostate generation\" and awaited the day of restoration when the Messiah would return and rebuild the true temple.\n\n### Who they were\n\n- Isaiah and his immediate disciples (8th century BC)\n- Their descendants and the communities that preserved their writings and oral traditions\n- Possibly the singing prophet-priests of David's three guilds (1 Chronicles 24) — what Josiah may have destroyed as \"houses of the *qedeshim*\"\n- The community behind the Damascus Document (Dead Sea Scrolls)\n- The Enoch tradition / Book of Enoch authors\n- Possibly the Therapeutae (healers) of northern Egypt — a word sharing the Hebrew consonants T-R-P with *teraphim* (household gods/healing images)\n\n### Their theology\n\nThe old believers preserved what the Deuteronomists suppressed:\n- Visions of God (theophany) — Isaiah 6 is their paradigm\n- The divine feminine (Wisdom/Asherah/the Lady)\n- Angels and the heavenly host\n- Melchizedek as divine/messianic\n- The Day of Atonement as the high priest's entry into God's presence\n- The eternal covenant (not just the law of Moses)\n\nIsaiah 1's preface summarizes their critique of Jerusalem: \"Sons have I reared and brought up, but they have rebelled against me... How the faithful city has become a harlot.\" The reformers' Jerusalem = a harlot. The Book of Revelation's burning of the harlot = the burning of this second-temple Jerusalem.\n\n### Their fate\n\nIsaiah and his disciples appear to have gone into exile east of the Jordan (in non-canonical texts) — taking their books and traditions with them. From there, they preserved the alternative voice. Barker: \"All aimed at answering the same question: what does restoration look like when the temple is restored?\"\n\n### Why Isaiah is quoted so heavily in the New Testament and Book of Mormon\n\nThe School of Isaiah preserved the Christmas prophecies, the Good Friday and Easter prophecies — all the texts that Christians read as messianic. They preserved these precisely because they saw through the Deuteronomists' temple and awaited a Messiah who would restore the true one. Jesus, by their lights, was doing exactly that.\n\nThe Book of Mormon quotes Isaiah more than any other prophet and includes all 66 chapters of Isaiah on the brass plates. This is consistent with Lehi being in the School of Isaiah tradition.\n\n## Lehi and the School of Isaiah\n\nThe Book of Mormon opens with Lehi fleeing Jerusalem c. 600 BC and calling the city wicked. Barker: this maps precisely onto the old-believer critique. The people Lehi accused were the Deuteronomist reformers (or their heirs). Lehi's theology — the tree of life, visions of God, the father and son imagery, Isaiah's writings — is first-temple theology.\n\nThe brass plates (which contain \"all the scriptures\" including more than the current Old Testament) represent the library the School of Isaiah carried out of Jerusalem before the Deuteronomists fully controlled the canon.\n\n## Connection to Jesus\n\nJesus cleansed the temple with the action of a first-temple high priest. He taught theophany (pure in heart = see God). He claimed the Day of Atonement (torn veil = holy of holies opened). He quoted the School of Isaiah's most treasured texts. He was, in Barker's reading, the restorer the old believers had been waiting for since Josiah's reform.\n\n## Connections\n\n- See also: [[deuteronomic-reform]], [[temple-theology]], [[asherah]], [[divine-family]], [[serpent-symbolism]]\n- Key source: [[margaret-barker-school-of-isaiah]], [[what-did-josiah-reform-barker-byu]]\n- Key entity: [[margaret-barker]]\n- Connected to: [[lehis-dream]], [[pardes]], [[kabbalah]] (Kabbalah as a parallel preserving tradition)\n\n## Open questions / tensions\n\n- Is the School of Isaiah a formal group or Barker's analytical category? She treats it as a real network, but acknowledges it's a reconstruction.\n- How does the Dead Sea Scroll community (Essenes/Qumran) relate to the School of Isaiah? They share the \"apostate generation\" language.\n- The Therapeutae connection (Egypt, healing, T-R-P consonants) — is this Barker's independent reading or widely accepted?\n- If Lehi is in the School of Isaiah, what does this mean for the brass plates? They would contain old-believer texts the canonical Bible lost.", "links": ["asherah", "deuteronomic-reform", "divine-family", "kabbalah", "lehis-dream", "margaret-barker", "margaret-barker-school-of-isaiah", "pardes", "serpent-symbolism", "temple-theology", "what-did-josiah-reform-barker-byu"]}, {"slug": "serpent-symbolism", "folder": "concepts", "type": "concept", "category": "", "title": "Serpent Symbolism", "author": "", "channel": "", "date": "", "url": "", "tags": ["serpent", "seraph", "nachash", "hebrew", "numbers-21", "isaiah-6", "john-3", "book-of-mormon", "ancient-israel", "christ"], "updated": "2026-06-26", "body": "# Serpent Symbolism\n\nIn ancient Israelite religion, the serpent (Hebrew *nachash*) was not unambiguously evil — it was closely associated with *seraphim* (burning divine beings), healing from death and sin, and ultimately with Christ. The serpent on Moses's pole in Numbers 21 and the seraphim in Isaiah 6 are the same category of divine being, both offering healing from the ultimate human problems (death and sin).\n\n## Explanation\n\nThe modern Western reading of \"serpent = Satan = evil\" is a flattened reading that loses the ancient multilayered meaning. According to [[mike-day]], [[dave-butler]], and the scholarship of James H. Charlesworth (*The Good and Evil Serpent*), the ancient Israelite serpent symbol was *dual*: capable of causing and healing death, associated with divine beings, and ultimately redeemed in Christ's self-identification.\n\n## The Seraph / Nachash Connection\n\n| Hebrew Term | Meaning | Where |\n|---|---|---|\n| *Nachash* | Serpent, shining one | Eden (Gen 3); Numbers 21 |\n| *Seraph* | Burning one, fiery being | Numbers 21:6-8; Isaiah 6:1-7 |\n| *Nahash hannahoshet* | Serpent of brass/bronze | The object Moses made (Num 21:9) |\n\n- In Numbers 21:8, God tells Moses: **\"Make a seraph\"** — not \"make a serpent.\" Moses then makes a *serpent of brass* (*nahash nahoshet*), which is a Hebrew pun — *nachash*, *nahoshet* share a root.\n- The *seraphim* in Isaiah 6 are six-winged divine beings in God's throne room in the Holy of Holies. Same word.\n- The brass/copper (*nahoshet*) color suggests a shining, brilliant being — connecting to Joseph Smith's description of God dwelling in \"everlasting burnings.\"\n\n## The Healing Pattern: Numbers 21 and Isaiah 6\n\n| Text | Problem | Solution |\n|---|---|---|\n| Numbers 21 | Death by serpent bites | Look at the serpent on the pole → healed |\n| Isaiah 6 | Sin / unclean lips | Seraph touches Isaiah's lips with altar coal → sin expunged |\n| John 3:14 | Spiritual death / separation from God | Son of Man lifted up → eternal life |\n\nAll three use the same *structure*: a divine serpentine being, elevated/lifted up, that solves the core human problem (death, sin, separation from God). Jesus makes this explicit: \"As Moses lifted up the serpent in the wilderness, so must the Son of Man be lifted up\" (John 3:14).\n\nThis is not a confusing comparison (Jesus ≠ evil). It is a precise typological claim: **I am the divine healer that Israel's serpent symbol pointed to all along.**\n\n## The Serpent in Eden Reconsidered\n\nTraditional Christian reading: Satan *is* the serpent. But the text says Satan \"put it into the heart of the serpent\" — possibly suggesting the serpent was a distinct being, a divine/seraphic creature from another realm, whose form Satan co-opted. Dave Butler and Mike Day suggest the serpent in Eden may be a *seraph from another world* — a divine being who brought knowledge, in a being that both heals and destroys, precisely as serpents do throughout the biblical tradition.\n\n## Book of Mormon Connection\n\nNumbers 21 is an **E text** (Elohist = northern Israelite tradition, the tradition of Ephraim and Manasseh). The Book of Mormon is argued to derive from a northern tribal text (Lehi is from Manasseh/Joseph). It contains **four references** to the serpent-on-a-pole imagery (1 Nephi 17:41; Alma 33:19-20; Alma 37:46; Helaman 8:14-15) — more than the Gentile Bible preserves. The northern tradition's serpent theology is preserved in the Book of Mormon in ways that the southern (J text / Judean) tradition does not emphasize.\n\nHezekiah destroyed the bronze serpent (*Nehushtan*) as part of his reforms (2 Kings 18:4) — which may have contributed to the erasure of this symbol from later Judean tradition. The Book of Mormon, coming from brass plates compiled before Hezekiah's reforms, preserves the older usage.\n\n## The Dark Side\n\nThe serpent symbol's duality is real: the same being that heals can destroy. This connects to the [[kabbalistic-tree-of-life]]'s concept of the Sitra Achra (dark tree) as a mirror of the Sefirot, and to the serpent's association with the adversary. The symbol was never simple.\n\n## Connections\n\n- See also: [[kabbalistic-tree-of-life]], [[pardes]], [[divine-family]], [[kabbalah]]\n- Key text: [[ancient-meaning-of-serpent-stick-of-joseph]]\n- Related entities: [[dave-butler]], [[mike-day]], [[the-stick-of-joseph]]\n- Evidenced in: [[jewish-convert-decodes-lehis-dream-rob-kay]] (dark tree / Sitra Achra)\n\n## Open questions / tensions\n\n- What is the precise relationship between *seraph* in Numbers 21 and Isaiah 6? Are they morphologically identical (same word) or related terms?\n- James H. Charlesworth's *The Good and Evil Serpent* is the key scholarly source — worth reading directly.\n- If the Eden serpent is a seraphic being, not Satan himself, what does this do to traditional LDS interpretations of the Fall?\n- The \"brilliant/shining\" reading of *nahoshet* (brass) — is this a mainstream scholarly view or a niche interpretation?", "links": ["ancient-meaning-of-serpent-stick-of-joseph", "dave-butler", "divine-family", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalah", "kabbalistic-tree-of-life", "mike-day", "pardes", "the-stick-of-joseph"]}, {"slug": "stories-as-hierarchies-of-value", "folder": "concepts", "type": "concept", "category": "", "title": "Stories as Hierarchies of Value", "author": "", "channel": "", "date": "", "url": "", "tags": ["peterson", "mythology", "stories", "values", "perception", "meaning", "postmodernism"], "updated": "2026-06-27", "body": "# Stories as Hierarchies of Value\n\n[[jordan-b-peterson]]'s framework: we cannot perceive the world without a hierarchy of values guiding what we attend to; a story is a description of such a hierarchy; and mythology is the distillation of the deepest, most compelling stories accumulated over millennia — making it more *real* than the merely literal.\n\n## Explanation\n\n### The fundamental problem\n\nYou cannot look at the world and simply \"take in the facts.\" Every glance requires you to prioritize — to decide what matters enough to attend to and what to suppress into invisibility. Even visual perception is inseparable from action and value: you cannot focus your eyes without deciding what deserves focus.\n\nThis is not a philosophical position — it's a finding of perceptual science, AI research, cognitive neuroscience, and the philosophy of David Hume (\"you cannot derive an ought from an is\"). There are infinitely many facts; only values can tell you which ones matter.\n\n**A story is a description of a hierarchy of value.** When you watch a movie, you watch the protagonist and try to understand their motivations, aims, and moral structure — so that you can mimic their emotional responses and learn to navigate evaluative landscapes you haven't encountered yet. You pay to see stories even when they horrify you because the cost of *not* practicing how to navigate fear and death is higher.\n\n### Mythology as the distillation\n\nIf some stories are more compelling than others — and this is obvious, since some fiction moves you to your depths while other fiction is trivial — then there are levels of depth in fiction. The most compelling stories, aggregated and distilled over millennia, become mythology. Mythology is the *ultimate abstraction of value* — stories that have proven themselves across generations and cultures as the most accurate representations of how to navigate being.\n\nPeterson: \"Deep fiction is the ultimate abstraction of value and that's crucial because we see the world through a structure of value.\" This is why numbers are more powerful than brute material facts: abstractions can be more real than what they represent.\n\n### The postmodernist insight and error\n\nThe postmodernists (France, 1970s — largely Marxists) correctly identified that we see the world through stories. But they made a fatal error: they reduced the foundational story to *power* — the claim that every hierarchy of value is really just a power grab by the oppressor over the oppressed.\n\nPeterson's counterargument: if power were the fundamental organizing principle, psychopaths (who use *only* power) would dominate and be the majority. They are ~3% of the population and do poorly. Psychopaths cannot cooperate; cooperation is stronger than pure power. The Marxist-postmodernist reduction fails empirically.\n\n### The biblical corpus as the investigation\n\nIf we live within a hierarchy of value, and that hierarchy is best described by stories, and mythology is the deepest form of those stories — then the question is: *what is the best mythology?* Peterson's answer: the biblical corpus has been accumulating the answer to the foundational question across millennia. That question:\n\n> \"On what principle is the world founded? And on what principle *should* the world be founded?\"\n\nNot power (Nietzsche, Marxism, postmodernism). Not raw facts (naive empiricism). Something else — which the biblical stories, from Genesis to Revelation, are investigating. Peterson's tour is an attempt to articulate what that something is.\n\n### Science as prayer (connection to the mythological)\n\nPeterson argues that scientific hypothesis generation is a descendant of prayer — both are a genuine reaching into the unknown from the admission of insufficiency. What \"shines forth\" to the scientist (what grips their attention as a real problem) is the same phenomenon that calls a person to prayer. Both are responses to an autonomous calling that is not under voluntary control.\n\n## Connections\n\n- See also: [[faith-and-doubt]], [[divine-family]], [[pardes]]\n- Key entity: [[jordan-b-peterson]]\n- Evidenced in: [[the-problem-that-wont-let-you-go-peterson]]\n\n## Open questions / tensions\n\n- Peterson's framework is not explicitly religious — he often treats God as a psychological/archetypal reality rather than a literal being. How does this sit with the personal, familial God of [[divine-family]] and [[temple-theology]]?\n- The claim that mythology is \"more real than the literal\" is powerful but needs precision: in what sense more real? Peterson gestures at Platonic forms but seems to reject Platonism elsewhere.\n- The convergence with [[pardes]]: Peterson's mythology framework is structurally similar to the Sod level (mystical/hidden meaning) of the four levels of scripture reading. Both argue the surface meaning is not the deepest meaning.", "links": ["divine-family", "faith-and-doubt", "jordan-b-peterson", "pardes", "temple-theology", "the-problem-that-wont-let-you-go-peterson"]}, {"slug": "suicidal-empathy", "folder": "entities", "type": "entity", "category": "product", "title": "Suicidal Empathy", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "psychology", "evolutionary-psychology", "social-commentary"], "updated": "2026-06-27", "body": "# Suicidal Empathy\n\nGad Saad's critique of how misapplied empathy and progressive ideology undermine Western civilization and rational thinking.\n\n## Overview\n\nEvolutionary behavioral scientist Gad Saad argues that excessive, misdirected empathy — what he calls \"suicidal empathy\" — is being weaponized against the very societies that champion it. Drawing on evolutionary psychology, he examines how pathological altruism and ideological conformity erode reason, free speech, and cultural resilience.\n\n## Key facts\n\n- Author: Gad Saad\n- Genre: Nonfiction / Evolutionary Psychology / Social Commentary\n- Length (audiobook): 8h 23m\n- Status: Finished\n\n## Connections\n\n- Related to: [[gad-saad]]\n- In Audible library: yes\n\n## Notes / open questions\n\n- Potential counterweight source for the wiki — Saad's secular, evolutionary lens is a strong contrast to the predominantly LDS theological and spiritual content in the library\n- His framework around \"idea pathogens\" and memetic infections may connect interestingly to [[epistemic-diversity]]", "links": ["epistemic-diversity", "gad-saad"]}, {"slug": "task-vs-ego-orientation", "folder": "concepts", "type": "concept", "category": "", "title": "Task vs. Ego Orientation", "author": "", "channel": "", "date": "", "url": "", "tags": ["mental-performance", "psychology", "ego", "task", "motivation", "fear", "choking"], "updated": "2026-06-26", "body": "# Task vs. Ego Orientation\n\nThe two fundamental modes of the performing mind, as described by [[craig-manning]]: ego orientation seeks approval through outcomes; task orientation seeks skill execution. They cannot coexist in the conscious mind simultaneously.\n\n## Explanation\n\nCraig Manning's central insight is that the human conscious mind is *binary* with respect to motivation — it is either focused on **what you are trying to achieve** (outcomes, approval, looking good) or on **what you are actually doing** (the skill, the process, the execution). These two modes produce radically different performance results.\n\n### Ego Orientation\n\n- Seeks: **approval** from self or others, through outcomes\n- Mental object: **the future** (what this result will mean)\n- Emotional state: **fear** (fear lives in the future; ego, by orienting to future outcomes, breeds fear)\n- Behavioral consequences: choking, memory loss, under-performance under pressure, failure to persist, failure to work hard, extreme goal-setting, brittleness\n\n### Task Orientation\n\n- Seeks: **skill execution**, what am I doing *right now*\n- Mental object: **the present** (this action, this moment)\n- Emotional state: **motivation** (process-driven; fear cannot attach to the present)\n- Behavioral consequences: persistence, sustained effort, appropriate goal-setting, consistency under pressure\n\n### The Binary Rule\n\n\"Task and ego can't occupy the mind at the same time. Your conscious mind truly is binary.\" — [[craig-manning]]\n\nThis means: you cannot merely add task focus on top of ego orientation. You have to *displace* one with the other. Manning's coaching intervention in the Olga story worked precisely because it gave the athlete a trivial task-focus (\"hurry up and finish, I'm hungry\") that crowded out the ego thought (\"I could win this\").\n\n## Examples\n\n| Situation | Ego Orientation | Task Orientation |\n|-----------|-----------------|------------------|\n| Job interview | \"Will they like me? What if I bomb?\" | \"What is the next question they asked? Answer clearly.\" |\n| Athletic performance | \"If I win this, I'll prove I'm good\" | \"Execute this next play\" |\n| Public speaking | \"They're judging me\" | \"Speak the next sentence\" |\n| Taking a test | \"I need an A to make my parents proud\" | \"What does this question ask?\" |\n\n### The Olga Story\n\nA tennis player ranked 61st was nearly beating the world's #1 player. When task-focused, she was brilliant. The moment she thought \"I could win this\" (ego — outcome in the future), her performance collapsed. Manning's intervention: \"Hurry up and get this over with, I'm hungry.\" A completely trivial task thought. She played brilliantly again, won the set.\n\n## Perfectionists as ego-oriented\n\nPerfectionists look like task-oriented people but are actually ego-oriented — they seek perfect outcomes to earn approval (even self-approval). The behavioral signature gives it away: they don't persist, they avoid hard challenges, and they choke. Manning calls perfectionism one of the most disguised forms of ego orientation.\n\n## Confident humility\n\nManning's prescriptive phrase: **\"confident humility.\"** Not arrogance (belief you deserve to win), not self-doubt (belief you'll fail). Confident *in your skills*; humble enough to know no one is entitled to success and the task always demands your attention.\n\n## Connections\n\n- See also: [[mental-performance]]\n- Used by: [[craig-manning]]\n- Evidenced in: [[craig-manning-overcoming-egos-tedxbyu]], [[craig-manning-d2dcon-power-of-mind]]\n\n## Open questions / tensions\n\n- Is task orientation the same as \"present-moment awareness\" in Buddhist mindfulness traditions? There seems to be a strong structural parallel.\n- The framework assumes a binary conscious mind — how does this interact with dual-process theory (System 1 / System 2)?\n- Manning claims the framework was developed with elite sport research — worth looking at Ames (1992), Nicholls (1984) who founded achievement goal theory (the academic name for task vs. ego orientation).", "links": ["craig-manning", "craig-manning-d2dcon-power-of-mind", "craig-manning-overcoming-egos-tedxbyu", "mental-performance"]}, {"slug": "temple-theology", "folder": "concepts", "type": "concept", "category": "", "title": "Temple Theology", "author": "", "channel": "", "date": "", "url": "", "tags": ["margaret-barker", "temple", "first-temple", "creation", "holy-of-holies", "microcosm", "liturgy", "lds"], "updated": "2026-06-27", "body": "# Temple Theology\n\n[[margaret-barker]]'s scholarly framework for reading early Christianity, the Old Testament, and LDS scripture through the lens of first-temple Israelite religion. The core claim: the Jerusalem temple was a microcosm of creation, and first-temple theology — suppressed by the Deuteronomic reform — is the theological foundation of both the New Testament and the Book of Mormon.\n\n## Explanation\n\nTemple Theology is the name Barker has given to her approach to biblical studies, developed over 60+ years of independent research following her Cambridge training. Its core claims:\n\n### The temple as microcosm of creation\n\nThe temple was not simply a place of worship — it was a *model of the created order*. The structure encoded the relationship between the material world and eternity:\n\n| Temple zone | What it represents |\n|---|---|\n| Outer courts | The visible material world |\n| Holy place (hekal) | The material creation |\n| The Veil | The boundary between matter and spirit; woven from four colors = the four elements |\n| Holy of Holies (debir) | The eternal realm beyond matter, outside time; where the Lord dwells |\n\nThe Six Days of creation correspond to the Six Days of Moses building the tabernacle. Day One = the Holy of Holies = the creation of the angel spirits (the \"light\" of Genesis 1, revealed fully only in the Book of Jubilees). This was a *secret* of the Holy of Holies accessible only to the high priests — and suppressed by Josiah.\n\n### The temple as covenant bridge\n\nWhat was done in the temple affected the land; what was done in the land registered as pollution in the temple. The Day of Atonement cleansed the temple = cleansed the entire land. The \"eternal covenant\" bound the material world to the world beyond the veil. When that covenant bond is broken, \"the people unravel\" (Proverbs 29:18).\n\n### First temple vs. second temple\n\nThe first temple (Solomon's, to Josiah's reform) preserved: the divine feminine (Asherah), visions of God, angel priests, Wisdom as a divine figure, the Melchizedek priesthood, the tree of life/menorah, Day of Atonement as the high priest's entry into the holy of holies. See [[deuteronomic-reform]] for what was stripped out.\n\n### Jesus as a first-temple man\n\nJesus operated entirely within first-temple theology, not second-temple Deuteronomism:\n- \"Blessed are the pure in heart for they shall see God\" — theophany, a first-temple concept Deuteronomy denied\n- The Day of Atonement: Deuteronomy lacks this entirely; Jesus's ministry culminates in the ultimate Yom Kippur\n- The \"whip of cords\" in the temple cleansing = the high priestly sprinkling action of Yom Kippur\n- The torn veil at the crucifixion = the holy of holies opened to all; the eternal covenant restored\n\n### LDS temple as heir of first-temple tradition\n\nBarker visited the Rome and Paris LDS temples (before consecration) and recognized the ancient temple's ascending movement in both. She did not see imitation of Solomon's Temple literally — she saw the *structure and experience* preserved: movement upward through increasing holiness toward a place of light. This mirrored what she had recognized years earlier in an Orthodox church: \"the holy of holies alive and well.\"\n\n## Barker's non-LDS perspective\n\nBarker is a Methodist, not LDS. She arrived at her conclusions independently, without using the Book of Mormon as a source. Noel Reynolds read her book *The Great Angel* and thought she was a \"hidden Latter-day Saint.\" The convergence is significant precisely because it is independent.\n\n## Connections\n\n- See also: [[deuteronomic-reform]], [[school-of-isaiah]], [[asherah]], [[divine-family]], [[serpent-symbolism]], [[kabbalistic-tree-of-life]], [[kabbalah]]\n- Key entity: [[margaret-barker]]\n- Evidenced in: [[margaret-barker-school-of-isaiah]], [[what-did-josiah-reform-barker-byu]], [[margaret-barker-divine-feminine]]\n\n## Open questions / tensions\n\n- The correspondence between the LDS temple endowment and the ancient temple is a sensitive topic. Barker identifies structural parallels without claiming insider knowledge.\n- How does Barker's \"eternal covenant\" relate to the Kabbalistic *Brit* (covenant)? Both seem to describe the same bond between the material world and the divine.\n- The creation / tabernacle-days correspondence (Day One = Holy of Holies = angels) has significant implications for Genesis 1 interpretation. Worth developing.", "links": ["asherah", "deuteronomic-reform", "divine-family", "kabbalah", "kabbalistic-tree-of-life", "margaret-barker", "margaret-barker-divine-feminine", "margaret-barker-school-of-isaiah", "school-of-isaiah", "serpent-symbolism", "what-did-josiah-reform-barker-byu"]}, {"slug": "ancient-meaning-of-serpent-stick-of-joseph", "folder": "sources", "type": "source", "category": "", "title": "The Ancient Meaning of 'the Serpent' is More Profound Than You Think", "author": "Mike Day, Dave Butler", "channel": "The Stick of Joseph", "date": "2025-10-12", "url": "https://www.youtube.com/watch?v=HmT9GXDMuOA", "tags": ["serpent", "seraph", "hebrew", "book-of-mormon", "isaiah", "numbers", "christ", "ancient-israel"], "updated": "2026-06-26", "body": "# The Ancient Meaning of 'the Serpent' is More Profound Than You Think\n\n## Summary\n\nMike Day and Dave Butler explore the ancient Hebrew serpent symbol — specifically arguing that in Numbers 21, Isaiah 6, and John 3:14, the serpent is not simply \"evil/Satan\" but a divine being (seraph = burning one) that heals from death and sin. When Jesus compares himself to the Moses's serpent on a pole, he's not making a bizarre or confusing comparison — he's invoking a well-established ancient Israelite symbol of the divine being that solves the problem of death. The Book of Mormon's four references to this imagery (largely absent from gentile awareness) strengthen its claim to authenticity as a northern Israelite text.\n\n## Key takeaways\n\n- **Seraph ≠ snake (simply).** In Numbers 21, God tells Moses to make a *seraph* (burning one), not a *nachash* (serpent). Moses then makes a *nahash* of *nahoshet* (serpent of brass) — which is a Hebrew pun (nachash/nahoshet sound alike). The *seraph* in Isaiah 6 are six-winged beings in the Holy of Holies. Same word, same concept: a divine burning being.\n- **The serpent solves death and sin.** Numbers 21: the problem is death by snakebite; the solution is a serpent on a pole that heals when looked upon. Isaiah 6: the problem is sin/unclean lips; the solution is a seraph who touches Isaiah's lips with a coal from the altar, expunging his sin.\n- **John 3:14 makes perfect sense in this frame.** \"As Moses lifted up the serpent... so must the Son of Man be lifted up.\" Jesus isn't making a confusing comparison to evil — he's invoking Israel's divine healing serpent. Thousands of biblical commentaries miss this because they can't get past \"snakes = bad.\"\n- **The serpent in Eden is more complex than tradition holds.** The text doesn't say Satan *is* the serpent — it says Satan *put it into the heart of* the serpent. The being in the Garden may be a seraph/divine being from another world, not simply Satan in animal form.\n- **Brass/copper (nahoshet) = shining/brilliant.** Commentators suggest the brass serpent symbolizes a brilliant shining being from another world — connecting to Joseph Smith's teaching that God dwells in \"everlasting burnings.\"\n- **Northern text connection.** Numbers 21 is an E text (Elohist = northern tradition). The Book of Mormon is argued to be a northern tribal text (Manasseh/Ephraim). Its four references to the serpent-on-a-pole imagery are preserved from the northern tradition largely absent from gentile Bibles.\n- **Referenced book:** James H. Charlesworth, *The Good and Evil Serpent: How a Universal Symbol Became Christianized*.\n\n## Entities mentioned\n\n[[the-stick-of-joseph]], [[mike-day]], [[dave-butler]]\n\n## Concepts discussed\n\n[[serpent-symbolism]], [[pardes]], [[kabbalistic-tree-of-life]]\n\n## Contradictions / tensions with existing wiki\n\nExtends and deepens [[jewish-convert-decodes-lehis-dream-rob-kay]] — Rob Kay discussed the dark tree (Sitra Achra) as a mirror of the Sefirot. This episode reveals the serpent symbol was never unambiguously \"evil\" even in the Old Testament — which explains why the dark tree and the light tree share a serpentine symbol. The serpent is dual: it can be the healer (Christ) or the destroyer (adversary), which is precisely what Rob Kay described with the two trees.\n\n## Quotes worth keeping\n\n> \"We have to get out of our modern world and understand how the ancients saw stuff. And if we can get into their world and understand how they saw this stuff, then we can see the scriptures with new eyes.\" — James H. Charlesworth (cited)\n\n> \"We stand upon layer after layer after layer of cultural rubble and cultural interpretation of text. And so if we can go down to how — how did Isaiah see this stuff? How did Nephi see this stuff?\"\n\n> \"The Book of Mormon is showing us 7th century BC views of the serpent that we don't have.\"", "links": ["dave-butler", "jewish-convert-decodes-lehis-dream-rob-kay", "kabbalistic-tree-of-life", "mike-day", "pardes", "serpent-symbolism", "the-stick-of-joseph"]}, {"slug": "the-art-of-war", "folder": "entities", "type": "entity", "category": "product", "title": "The Art of War", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "strategy", "philosophy", "military", "classical"], "updated": "2026-06-27", "body": "# The Art of War\n\nSun Tzu's ancient Chinese military treatise — one of the most influential strategic texts ever written, with applications far beyond warfare.\n\n## Overview\n\nWritten by the Chinese military strategist Sun Tzu (~5th century BC), *The Art of War* is a 13-chapter treatise on military strategy and tactics. It has been applied to business, politics, sports, and personal development. Its central thesis: victory comes from knowing yourself and your enemy, and from strategic positioning rather than brute force.\n\n## Key facts\n\n- Author: Sun Tzu\n- Genre: Nonfiction / Strategy / Classical Philosophy\n- Length (audiobook): 1h 7m\n- Status: Finished\n\n## Connections\n\n- Related to: [[sun-tzu]]\n- In Audible library: yes\n\n## Notes / open questions\n\n- Very short listen (just over 1 hour) — likely already consumed\n- Classic text that would pair well with [[the-laws-of-human-nature]] on the theme of understanding human behavior and competition", "links": ["sun-tzu", "the-laws-of-human-nature"]}, {"slug": "the-automatic-millionaire", "folder": "entities", "type": "entity", "category": "product", "title": "The Automatic Millionaire, Expanded and Updated", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "nonfiction", "personal-finance", "investing"], "updated": "2026-06-27", "body": "# The Automatic Millionaire, Expanded and Updated\n\nDavid Bach's personal finance system for building wealth through automated savings and spending habits.\n\n## Overview\nBach argues that becoming wealthy doesn't require willpower or budgeting — it requires automating your finances so saving happens before you can spend. Core concepts include the Latte Factor (small daily spending adds up), Pay Yourself First, and automating retirement and mortgage contributions.\n\n## Key facts\n- Author: David Bach\n- Genre: Personal Finance\n- Edition: Expanded and Updated\n- Length (audiobook): ~3 hours (core content)\n\n## Connections\n- Related to: [[david-bach]]\n\n## Notes / open questions\n- Practical, system-based approach rather than motivational; pairs well with budgeting and investing frameworks", "links": ["david-bach"]}, {"slug": "the-disappearing-prophet-anthology", "folder": "entities", "type": "entity", "category": "product", "title": "The Disappearing Prophet Anthology", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "fiction", "LDS", "Book-of-Mormon", "fantasy", "three-nephites"], "updated": "2026-06-27", "body": "# The Disappearing Prophet Anthology\n\nChristina Dymock's LDS fiction anthology centered on the Three Nephites and a cosmic divine quest.\n\n## Overview\nA collection of stories about the Three Nephites — the LDS scriptural figures said to remain on earth until Christ's second coming. Involves an angel, a divine star, and a quest described as shaking \"empires and eternity.\"\n\n## Key facts\n- Author: Christina Dymock\n- Genre: LDS Fiction / Fantasy\n- Length (audiobook): ~8 hours 53 minutes\n\n## Connections\n- Related to: [[christina-dymock]]\n- See also: [[divine-family]] (LDS theological themes)\n\n## Notes / open questions\n- Anthology format — multiple stories or a serialized narrative\n- Three Nephites motif is a distinctive LDS folk/scriptural tradition", "links": ["christina-dymock", "divine-family"]}, {"slug": "the-key-to-the-keystone", "folder": "entities", "type": "entity", "category": "product", "title": "The Key to the Keystone", "author": "", "channel": "", "date": "", "url": "", "tags": ["audiobook", "fiction", "LDS", "Book-of-Mormon", "thriller"], "updated": "2026-06-27", "body": "# The Key to the Keystone\n\nJonah R. Barnes's LDS-themed no
